<script>
    async function loadJSON(path) {
        const res = await fetch(path);
        if (!res.ok) {
            throw new Error(`无法加载 JSON：${path} (${res.status})`);
        }
        return res.json();
    }

    function createElementFromHTML(html) {
        const template = document.createElement('template');
        template.innerHTML = html.trim();
        return template.content.firstElementChild;
    }

    // Global states
    let componentCounter = 0;
    let currentDragPayload = null;
    let zoomLevel = 1.0;
    const ZOOM_STEP = 0.1;
    const MIN_ZOOM = 0.5;
    const MAX_ZOOM = 2.0;

    let featureConfig = {};
    let presetLinesConfig = [];
    let presetFacilitiesConfig = [];
    let compositeComponents = [];
    let basicComponents = [];
    let categoriesConfig = [];

    let signsConfig = {};
    let addonsList = [];
    let currentAddonId = 'default';
    let zoneCounter = 0;
    let selectedElement = null;

    function updateZoom() {
        const canvas = document.getElementById('canvas');
        if (canvas) {
            canvas.style.zoom = zoomLevel;
            // 强制重绘 canvas 和伪元素，防止缩放时的渲染伪影
            canvas.style.visibility = 'hidden';
            requestAnimationFrame(() => {
                canvas.style.visibility = 'visible';
            });
        }
        const zoomLabel = document.getElementById('zoomLabel');
        if (zoomLabel) {
            zoomLabel.textContent = `${Math.round(zoomLevel * 100)}%`;
        }
        const btnZoomOut = document.getElementById('btnZoomOut');
        const btnZoomIn = document.getElementById('btnZoomIn');
        if (btnZoomOut) btnZoomOut.disabled = zoomLevel <= MIN_ZOOM;
        if (btnZoomIn) btnZoomIn.disabled = zoomLevel >= MAX_ZOOM;
    }

    function applyTagsToElement(element, tags) {
        Object.entries(tags).forEach(([key, value]) => {
            if (value === undefined || value === null) return;
            const lowerKey = key.toLowerCase();

            // 1. 【修复核心】拦截所有以 'style' 结尾的属性
            if (lowerKey.endsWith('style')) {
                const targetKey = lowerKey === 'style' ? '' : key.substring(0, key.toLowerCase().lastIndexOf('style'));
                const styleTarget = targetKey ? (element.querySelector(`.${targetKey}`) || element.querySelector(`[data-tag="${targetKey}"]`)) : element;

                if (styleTarget) {
                    styleTarget.style.cssText = (styleTarget.style.cssText || '') + ';' + value;
                }
                return;
            }

            if (lowerKey === 'color') {
                element.style.backgroundColor = value;
                return;
            }

            const target = element.querySelector(`.${key}`) || element.querySelector(`[data-tag="${key}"]`);

            // 2. 处理文本字段
            if (lowerKey.includes('text') || target) {
                const textTarget = target || element;
                textTarget.textContent = value;
                return;
            }

            // 处理 src 属性
            if (lowerKey === 'src') {
                // If using shentong style addon, resolve relative icon paths
                let resolvedSrc = value;
                if (currentAddonId !== 'default' && !value.startsWith('http') && !value.startsWith('data:') && !value.startsWith('./addons/')) {
                    if (value.startsWith('icon/')) {
                        resolvedSrc = `./addons/${currentAddonId}/${value}`;
                    }
                }
                if (element.tagName === 'IMG') {
                    element.src = resolvedSrc;
                    return;
                }
                const innerImg = element.querySelector('img');
                if (innerImg) {
                    innerImg.src = resolvedSrc;
                    return;
                }
            }

            const finalTarget = target || element;
            finalTarget.setAttribute(key, value);
        });
    }

    function renderBasicComponent(component, tags = {}, componentId, isInComposite = false) {
        const root = createElementFromHTML(component.html);
        if (!root) throw new Error(`基础组件解析失败: ${component.id}`);
        root.id = componentId || `component${componentCounter++}`;
        applyTagsToElement(root, tags);

        if (!isInComposite) {
            const featureString = `${component.feature ? component.feature + ' ' : ''}advancedOptions`.trim();
            root.dataset.feature = featureString;
            root.addEventListener('click', (e) => {
                e.stopPropagation();
                openPropertyPanel(root);
            });
        }
        return root;
    }

    function renderCompositeComponent(item, basicComponents) {
        const composite = document.createElement('div');
        composite.className = `composite ${item.id}`;
        composite.id = `component${componentCounter++}`;

        composite.dataset.feature = `${item.feature ? item.feature + ' ' : ''}advancedOptions`.trim();

        item.ingredients.forEach((ingredient) => {
            const basic = basicComponents.find((comp) => comp.id === ingredient.componentId);
            if (!basic) return;
            const componentProps = ingredient.props || ingredient.tags || {};
            const node = renderBasicComponent(basic, componentProps, undefined, true);
            composite.appendChild(node);
        });

        composite.addEventListener('click', (e) => {
            e.stopPropagation();
            openPropertyPanel(composite);
        });

        return composite;
    }

    function createZoneElement(category, zoneClass, canvas, beforeNode) {
        const zone = document.createElement('div');
        zone.className = zoneClass;
        zone.dataset.category = category;
        zone.id = `zone${zoneCounter++}`;

        // Every zone gets the zoneWidth feature
        if (zone.classList.contains('lineColor')) {
            zone.dataset.feature = 'selectLine zoneTextWidth zoneAlign advancedOptions';
        } else {
            zone.dataset.feature = 'zoneTextWidth zoneAlign advancedOptions';
        }

        zone.addEventListener('click', (e) => {
            if (e.target === zone) {
                e.stopPropagation();
                openPropertyPanel(zone);
            }
        });

        if (beforeNode && beforeNode.parentNode === canvas) {
            canvas.insertBefore(zone, beforeNode);
        } else {
            canvas.appendChild(zone);
        }
        return zone;
    }

    function appendComponentToZone(category, zoneClass, node, canvas) {
        const existing = canvas.querySelector(`.zone[data-category="${category}"]`);
        const zone = existing || createZoneElement(category, zoneClass, canvas);
        zone.appendChild(node);
        return zone;
    }

    let isCategoryButtonsRendered = false;

    function renderCategoryButtons(categories, selectedCategoryId, onSelect) {
        const list = document.getElementById('categoriesList');
        if (!list) return;

        if (!isCategoryButtonsRendered) {
            list.innerHTML = '';
            categories.forEach((category) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.dataset.id = category.id;
                button.className = category.id === selectedCategoryId ? 'activeCategory' : '';

                const label = document.createElement('span');
                label.textContent = category.nameCN || category.id;
                button.appendChild(label);

                const english = document.createElement('span');
                english.textContent = category.nameEN || '';
                english.className = 'categoryEnglish';
                button.appendChild(english);

                button.addEventListener('click', () => onSelect(category.id));
                list.appendChild(button);
            });
            isCategoryButtonsRendered = true;
        } else {
            const buttons = list.querySelectorAll('button');
            buttons.forEach((button) => {
                if (button.dataset.id === selectedCategoryId) {
                    button.classList.add('activeCategory');
                } else {
                    button.classList.remove('activeCategory');
                }
            });
        }
    }

    function createComponentButton(item, kind, onClick, currentCategoryId) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'componentItem';

        const thumbnail = document.createElement('img');
        let srcPath = `icon/thumbnail/${item.id}.svg`;

        // Adjust thumbnail path for addons
        if (currentAddonId !== 'default' && !srcPath.startsWith('http') && !srcPath.startsWith('data:') && !srcPath.startsWith('./addons/')) {
            srcPath = `./addons/${currentAddonId}/${srcPath}`;
        }

        thumbnail.src = srcPath;
        thumbnail.alt = item.name;
        thumbnail.className = 'componentThumbnail';

        thumbnail.addEventListener('error', () => {
            // Fallback to default icon if thumbnail not found
            thumbnail.src = 'icon/default.svg';
        });

        if (item.thumbnailBg === 'dark') {
            thumbnail.style.backgroundColor = '#b0b0b0';
        } else {
            thumbnail.style.backgroundColor = 'transparent';
        }

        button.appendChild(thumbnail);

        const textWrapper = document.createElement('div');
        textWrapper.className = 'componentTextWrapper';

        const label = document.createElement('span');
        label.textContent = item.name;
        label.className = 'componentName';
        textWrapper.appendChild(label);

        if (item.description) {
            const desc = document.createElement('span');
            desc.textContent = item.description;
            desc.className = 'componentDescription';
            textWrapper.appendChild(desc);
        }

        button.appendChild(textWrapper);

        button.draggable = true;
        button.addEventListener('dragstart', (e) => {
            // 处理 category 为字符串或数组的情况
            let categoryValue = item.category || kind;
            if (Array.isArray(categoryValue)) {
                // 如果当前分类在组件的分类列表中，使用当前分类；否则使用第一个
                categoryValue = currentCategoryId && categoryValue.includes(currentCategoryId) 
                    ? currentCategoryId 
                    : categoryValue[0];
            }
            const payload = { kind, id: item.id, category: categoryValue, name: item.name };
            currentDragPayload = payload;
            const payloadStr = JSON.stringify(payload);
            e.dataTransfer.setData('application/json', payloadStr);
            e.dataTransfer.setData('text/plain', payloadStr);
        });
        button.addEventListener('dragend', () => {
            currentDragPayload = null;
            hideInsertLine();
        });
        button.addEventListener('click', onClick);

        return button;
    }

    function createComponentsGroup(title, items, renderItem, categoryId) {
        const group = document.createElement('div');
        group.className = 'componentGroup';
        
        // 为 componentGroup 添加分类 class
        if (categoryId) {
            group.classList.add(categoryId);
        }
        
        const heading = document.createElement('h3');
        heading.textContent = title;
        group.appendChild(heading);

        if (items.length === 0) {
            const empty = document.createElement('div');
            empty.textContent = '暂无该分类组件';
            empty.className = 'emptyState';
            group.appendChild(empty);
            return group;
        }

        const list = document.createElement('div');
        list.className = 'componentGroupItems';
        items.forEach((item) => { list.appendChild(renderItem(item)); });
        group.appendChild(list);
        return group;
    }

    function renderComponentsList(categoryId, composites, basicComponents, categories, canvas) {
        const list = document.getElementById('componentsList');
        if (!list) return;
        list.innerHTML = '';

        const currentCategory = categories.find((category) => category.id === categoryId);
        const groupTitle = currentCategory ? `${currentCategory.nameCN || currentCategory.id}组件` : '当前分类组件';
        const categoryItems = composites.filter((item) => {
            // 支持 category 为字符串或数组
            if (Array.isArray(item.category)) {
                return item.category.includes(categoryId);
            }
            return item.category === categoryId;
        });

        const compositeGroup = createComponentsGroup(groupTitle, categoryItems, (item) => {
            return createComponentButton(item, 'composite', () => {
                const node = renderCompositeComponent(item, basicComponents);
                // 处理 category 为字符串或数组的情况
                let categoryValue = item.category || 'default';
                if (Array.isArray(categoryValue)) {
                    // 使用当前打开的分类
                    categoryValue = categoryId && categoryValue.includes(categoryId) 
                        ? categoryId 
                        : categoryValue[0];
                }
                const category = item.id === 'lineColorText' ? 'lineColor' : categoryValue;
                const zoneClass = item.id === 'lineColorText' ? 'zone lineColor' : `zone ${categoryValue}`;
                appendComponentToZone(category, zoneClass, node, canvas);
                openPropertyPanel(node);
            }, categoryId);
        }, categoryId);
        list.appendChild(compositeGroup);

        const basicGroup = createComponentsGroup('基础组件', basicComponents, (basic) => {
            return createComponentButton(basic, 'basic', () => {
                const node = renderBasicComponent(basic, {}, undefined, false);
                // 处理 category 为字符串或数组的情况
                let categoryValue = basic.category || 'basic';
                if (Array.isArray(categoryValue)) {
                    // 使用当前打开的分类
                    categoryValue = categoryId && categoryValue.includes(categoryId) 
                        ? categoryId 
                        : categoryValue[0];
                }
                appendComponentToZone(categoryValue, 'zone basic', node, canvas);
                openPropertyPanel(node);
            }, categoryId);
        });
        list.appendChild(basicGroup);
    }

    function selectElement(element) {
        if (selectedElement) {
            selectedElement.classList.remove('selected');
        }
        selectedElement = element;
        if (selectedElement) {
            selectedElement.classList.add('selected');
        }
        const btnDuplicate = document.getElementById('btnDuplicate');
        const btnDelete = document.getElementById('btnDelete');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');

        const isMoveable = selectedElement && (selectedElement.classList.contains('zone') || (!selectedElement.classList.contains('zone') && selectedElement.closest('.zone')));
        let canMoveLeft = false;
        let canMoveRight = false;
        if (isMoveable) {
            let parent, siblings, index;
            if (selectedElement.classList.contains('zone')) {
                parent = document.getElementById('canvas');
                siblings = Array.from(parent.children).filter(child => child.classList.contains('zone'));
                index = siblings.indexOf(selectedElement);
            } else {
                parent = selectedElement.closest('.zone');
                siblings = Array.from(parent.children).filter(child => !child.classList.contains('insert-line'));
                index = siblings.indexOf(selectedElement);
            }
            canMoveLeft = index > 0;
            canMoveRight = index >= 0 && index < siblings.length - 1;
        }

        if (btnDuplicate && btnDelete) {
            btnDuplicate.disabled = !selectedElement;
            btnDelete.disabled = !selectedElement;
        }
        if (btnLeft) btnLeft.disabled = !canMoveLeft;
        if (btnRight) btnRight.disabled = !canMoveRight;
    }

    function moveSelectedElement(direction) {
        if (!selectedElement) return;
        
        let parent, siblings, index;
        const isZone = selectedElement.classList.contains('zone');

        if (isZone) {
            parent = document.getElementById('canvas');
            siblings = Array.from(parent.children).filter(child => child.classList.contains('zone'));
            index = siblings.indexOf(selectedElement);
        } else {
            parent = selectedElement.closest('.zone');
            if (!parent) return;
            siblings = Array.from(parent.children).filter(child => !child.classList.contains('insert-line'));
            index = siblings.indexOf(selectedElement);
        }

        if (index === -1) return;

        if (direction === 'left' && index > 0) {
            parent.insertBefore(selectedElement, siblings[index - 1]);
        } else if (direction === 'right' && index < siblings.length - 1) {
            parent.insertBefore(siblings[index + 1], selectedElement);
        } else {
            return;
        }

        openPropertyPanel(selectedElement);
    }

    function duplicateSelectedElement() {
        if (!selectedElement) return;
        const parent = selectedElement.parentNode;
        if (!parent) return;

        const clone = selectedElement.cloneNode(true);

        // Reset IDs
        function resetIds(el) {
            if (el.classList.contains('zone')) {
                let maxZoneId = 0;
                document.querySelectorAll('.zone').forEach(z => {
                    const idNum = parseInt(z.id.replace('zone', ''), 10);
                    if (!isNaN(idNum) && idNum > maxZoneId) maxZoneId = idNum;
                });
                el.id = `zone${maxZoneId + 1}`;
            } else if (el.id) {
                el.id = `component${componentCounter++}`;
            }
            Array.from(el.children).forEach(child => resetIds(child));
        }

        resetIds(clone);

        // Bind event listeners
        function bindEvents(el) {
            if (el.classList.contains('zone')) {
                el.addEventListener('click', (e) => {
                    if (e.target === el) {
                        e.stopPropagation();
                        openPropertyPanel(el);
                    }
                });
                Array.from(el.children).forEach(child => {
                    bindEvents(child);
                });
            } else if (el.classList.contains('composite')) {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openPropertyPanel(el);
                });
            } else if (el.dataset.feature) {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openPropertyPanel(el);
                });
            }
        }

        bindEvents(clone);

        // Insert after selectedElement
        parent.insertBefore(clone, selectedElement.nextSibling);

        // Select the new clone
        selectElement(clone);
        openPropertyPanel(clone);
    }

    function deleteSelectedElement() {
        if (!selectedElement) return;
        const parent = selectedElement.parentNode;
        if (!parent) return;

        selectedElement.remove();

        // If parent zone is empty, remove it
        if (parent.classList.contains('zone') && parent.children.length === 0) {
            parent.remove();
        }

        deselectAll();
    }

    function deselectAll() {
        selectElement(null);
        const container = document.getElementById('featureControls');
        if (container) {
            container.innerHTML = '<span style="color: #5b5b5b;text-align: center;">未选中组件</span>';
        }
        const panelTitle = document.getElementById('propertyPanelTitle');
        if (panelTitle) {
            panelTitle.textContent = '属性面板';
        }
    }

    function getSelectionTitle(element) {
        const canvas = document.getElementById('canvas');
        if (!canvas) return '属性面板';

        const zones = Array.from(canvas.querySelectorAll('.zone'));

        if (element.classList.contains('zone')) {
            const zoneIndex = zones.indexOf(element) + 1;
            return `选中 · 区域 ${zoneIndex}`;
        } else {
            const parentZone = element.closest('.zone');
            if (parentZone) {
                const zoneIndex = zones.indexOf(parentZone) + 1;
                const children = Array.from(parentZone.children).filter(child => !child.classList.contains('insert-line'));
                const elementIndex = children.indexOf(element) + 1;
                return `选中 · 区域 ${zoneIndex} 元素 ${elementIndex}`;
            }
        }
        return '选中组件';
    }

    function getCurrentStretchRatio(element) {
    // 优先从 dataset 中获取精准的物理记录，防止浮点数转换误差
    return parseFloat(element.dataset.stretchRatio) || 1;
}

function applyHorizontalStretch(element, ratio) {
    if (!element) return;
    
    // 1. 初始化：精准记录最原始的纯物理总宽度（只记录一次）
    if (!element.dataset.originalWidth) {
        // 强制确保父容器使用标准的 border-box
        element.style.boxSizing = 'border-box';
        element.dataset.originalWidth = element.offsetWidth;
        
        // 清除可能残留的父级 transformOrigin 和 padding 动态干扰，恢复原生 CSS
        element.style.transformOrigin = '';
        element.style.transform = (element.style.transform || '').replace(/scaleX\([^\)]+\)/g, '').trim();
    }
    
    const originalWidth = parseFloat(element.dataset.originalWidth);
    
    // 2. 【核心步骤一】：父容器只改变真实 width，让画布完美响应式伸缩
    // 这样右侧绝对不会出现任何空隙、白边或边距不对等的问题
    if (!isNaN(originalWidth) && originalWidth > 0) {
        element.style.width = `${originalWidth * ratio}px`;
    }
    
    // 3. 【核心步骤二】：寻找或创建一个专门用来让内部文字/图标产生“压扁拉伸”视觉形变的包裹层
    // 这样既能让文字变形，又绝对不会破坏外层父容器的盒模型和边距
    let contentWrapper = element.querySelector('.stretch-content-wrapper');
    
    if (!contentWrapper) {
        // 如果没有，就动态创建一个，把父容器里的所有子节点丢进去
        contentWrapper = document.createElement('div');
        contentWrapper.className = 'stretch-content-wrapper';
        
        // 关键样式：让包裹层撑满父容器的内容区，并设置形变原点为左侧
        contentWrapper.style.width = '100%';
        contentWrapper.style.height = '100%';
        contentWrapper.style.display = 'flex';
        contentWrapper.style.alignItems = 'center';
        contentWrapper.style.transformOrigin = 'left center';
        
        // 转移子节点
        while (element.firstChild) {
            contentWrapper.appendChild(element.firstChild);
        }
        element.appendChild(contentWrapper);
    }
    
    // 4. 【核心步骤三】：只对内部包裹层进行视觉上的 scaleX 压扁或拉伸
    // 因为父容器变宽了 ratio 倍，内部包裹层如果再放大 ratio 倍，文字就会二次变形。
    // 为了让文字随着容器变宽而等比例拉伸，同时完美契合边界：
    // 当父级 width 变为 originalWidth * ratio 时，内部由于是 width: 100%，它已经变宽了。
    // 如果想要文字产生“硬挤压/硬拉伸”的滤镜效果，我们要计算它和父级宽度的比例关系。
    
    // 清理旧的 scaleX
    const transform = contentWrapper.style.transform || '';
    const parts = [];
    (transform.match(/\w+\([^\)]+\)/g) || []).forEach(part => {
        if (/^scaleX\(/.test(part) || /^scale\(/.test(part)) return;
        parts.push(part);
    });
    
    // 直接对内部内容施加拉伸率
    parts.push(`scaleX(${ratio})`);
    contentWrapper.style.transform = parts.join(' ').trim();
    
    // 保持内容在缩放时不溢出或者紧贴
    contentWrapper.style.width = `${100 / ratio}%`;
}

    function rgb2hex(rgb) {
        if (!rgb) return '#b0b0b0';
        if (/^#[0-9A-F]{6}$/i.test(rgb)) return rgb;
        const rgbMatch = rgb.match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/);
        if (!rgbMatch) return '#b0b0b0';
        function hex(x) {
            return ("0" + parseInt(x).toString(16)).slice(-2);
        }
        return "#" + hex(rgbMatch[1]) + hex(rgbMatch[2]) + hex(rgbMatch[3]);
    }

    // 属性面板数据绑定
    function openPropertyPanel(element) {
        const container = document.getElementById('featureControls');
        if (!container) return;
        container.innerHTML = '';

        selectElement(element);

        const panelTitle = document.getElementById('propertyPanelTitle');
        if (panelTitle) {
            panelTitle.textContent = getSelectionTitle(element);
        }

        const featuresStr = element.dataset.feature;
        if (!featuresStr) {
            container.innerHTML = '<div class="emptyState">该组件无自定调节属性</div>';
            return;
        }

        const features = featuresStr.split(' ');

        features.forEach(featKey => {
            if (featKey === 'advancedOptions') {
                const group = document.createElement('div');
                group.className = `featureGroup ${featKey}`;
                group.innerHTML = `<h4>高级选项</h4>`;

                const canvasEl = document.getElementById('canvas');
                const isCanvasFixed = canvasEl.style.width && canvasEl.style.width !== 'auto';
                
                // 宽度模式控制：适应 / 填充 / 固定
                const rowWidth = document.createElement('div');
                rowWidth.className = 'controlRow widthMode';
                const labelWidth = document.createElement('label');
                labelWidth.textContent = '宽度模式';
                rowWidth.appendChild(labelWidth);
                
                const listEl = document.createElement('div');
                listEl.className = 'optionListGrid';

                const currentFlex = element.style.flex;
                const hasFixedWidth = element.style.width && element.style.width !== 'auto' && element.style.width !== '';
                let currentMode = 'fit';
                if (hasFixedWidth) {
                    currentMode = 'fixed';
                } else if (currentFlex === '1' || currentFlex === '1 1 0px' || currentFlex === '1 1 0%') {
                    currentMode = 'fill';
                }

                const widthInput = document.createElement('input');
                widthInput.type = 'number';
                widthInput.step = '10';
                widthInput.style.marginLeft = '4px';
                widthInput.style.display = (currentMode === 'fixed') ? 'inline-block' : 'none';
                widthInput.value = hasFixedWidth ? parseInt(element.style.width) : element.offsetWidth;

                const updateWidthState = (mode, val) => {
                    listEl.querySelectorAll('.optionBtn').forEach(b => b.classList.remove('active'));
                    const targetBtn = Array.from(listEl.children).find(b => b.dataset.value === mode);
                    if (targetBtn && !targetBtn.disabled) targetBtn.classList.add('active');

                    if (mode === 'fit') {
                        element.style.flex = 'none';
                        element.style.width = '';
                        widthInput.style.display = 'none';
                    } else if (mode === 'fill') {
                        element.style.flex = '1';
                        element.style.width = '';
                        widthInput.style.display = 'none';
                    } else if (mode === 'fixed') {
                        element.style.flex = 'none';
                        const w = val || widthInput.value || element.offsetWidth;
                        element.style.width = `${w}px`;
                        widthInput.style.display = 'inline-block';
                        widthInput.value = w;
                    }
                };

                [{ value: 'fit', label: '适应' }, { value: 'fill', label: '填充' }, { value: 'fixed', label: '固定' }].forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'optionBtn';
                    btn.textContent = opt.label;
                    btn.dataset.value = opt.value;
                    if (opt.value === 'fill' && !isCanvasFixed) {
                        btn.disabled = true;
                        btn.title = '仅限固定宽度';
                    }
                    if (opt.value === currentMode) btn.classList.add('active');
                    btn.addEventListener('click', () => {
                        updateWidthState(opt.value);
                    });
                    listEl.appendChild(btn);
                });

                widthInput.addEventListener('input', () => {
                    updateWidthState('fixed', widthInput.value);
                });

                rowWidth.appendChild(listEl);
                rowWidth.appendChild(widthInput);
                group.appendChild(rowWidth);

                // 文字间距设置
                const rowSpacing = document.createElement('div');
                rowSpacing.className = 'controlRow letterSpacing';
                const labelSpacing = document.createElement('label');
                labelSpacing.textContent = '文字间距';
                rowSpacing.appendChild(labelSpacing);

                const spacingInput = document.createElement('input');
                spacingInput.type = 'number';
                spacingInput.step = '0.5';
                const firstTextEl = element.querySelector('.largeText, .textCN, .textEN');
                const currentSpacing = firstTextEl ? parseFloat(firstTextEl.style.letterSpacing) || 0 : 0;
                spacingInput.value = currentSpacing;

                spacingInput.addEventListener('input', () => {
                    const val = spacingInput.value;
                    const textEls = element.querySelectorAll('.largeText, .textCN, .textEN');
                    textEls.forEach(el => {
                        el.style.letterSpacing = val ? `${val}px` : '';
                    });
                });

                rowSpacing.appendChild(spacingInput);
                group.appendChild(rowSpacing);

                container.appendChild(group);
                return;
            }

            if (featKey === 'zoneWidth') {
                const group = document.createElement('div');
                group.className = `featureGroup ${featKey}`;
                group.innerHTML = `<h4>宽度设置</h4>`;

                const canvasEl = document.getElementById('canvas');
                const isCanvasFixed = canvasEl.style.width && canvasEl.style.width !== 'auto';

                const listEl = document.createElement('div');
                listEl.className = 'optionListGrid';

                const currentFlex = element.style.flex;
                const currentWidthVal = (currentFlex === '1' || currentFlex === '1 1 0px' || currentFlex === '1 1 0%') ? 'fill' : 'fit';

                [{ value: 'fit', label: '适应' }, { value: 'fill', label: '填充' }].forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'optionBtn';
                    btn.textContent = opt.label;
                    if (opt.value === 'fill' && !isCanvasFixed) {
                        btn.disabled = true;
                        btn.title = '仅限固定宽度';
                    }
                    if (opt.value === currentWidthVal) btn.classList.add('active');
                    btn.addEventListener('click', () => {
                        element.style.flex = (opt.value === 'fill') ? '1' : 'none';
                        listEl.querySelectorAll('.optionBtn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    });
                    listEl.appendChild(btn);
                });

                group.appendChild(listEl);
                container.appendChild(group);
                return;
            }

            if (featKey === 'zoneTextWidth' || featKey === 'zoneAlign') {
                // 合并字宽和对齐设置到统一的“区域设置”组（由配置驱动）
                let group = container.querySelector('.featureGroup.zoneSettings');
                if (!group) {
                    const config = featureConfig['zoneSettings'];
                    if (!config) return;
                    group = document.createElement('div');
                    group.className = `featureGroup zoneSettings`;
                    group.innerHTML = `<h4>${config.label}</h4>`;
                    container.appendChild(group);

                    config.controls.forEach(control => {
                        const listEl = document.createElement('div');
                        listEl.className = 'optionListGrid';
                        if (control.id) {
                            listEl.classList.add(control.id);
                        }

                        if (control.label === '字宽') {
                            const largeTextEl = element.querySelector('.largeText');
                            const isCond = largeTextEl && largeTextEl.style.fontStretch === '75%';
                            const currentVal = isCond ? 'condensed' : 'normal';

                            control.options.forEach(opt => {
                                const btn = document.createElement('button');
                                btn.className = 'optionBtn';
                                btn.textContent = opt.name;
                                if (opt.value === currentVal) btn.classList.add('active');
                                btn.addEventListener('click', () => {
                                    listEl.querySelectorAll('.optionBtn').forEach(b => b.classList.remove('active'));
                                    btn.classList.add('active');
                                    const varFontEls = element.querySelectorAll('.largeText');
                                    varFontEls.forEach(el => {
                                        el.style.fontStretch = (opt.value === 'condensed') ? '75%' : '';
                                    });
                                });
                                listEl.appendChild(btn);
                            });
                        } else if (control.label === '对齐') {
                            const currentVal = element.dataset.zoneAlign || 'left';
                            const applyZoneAlignment = (alignValue) => {
                                element.dataset.zoneAlign = alignValue;
                                const justifyMapping = { 'left': 'flex-start', 'center': 'center', 'right': 'flex-end' };
                                element.style.justifyContent = justifyMapping[alignValue] || 'flex-start';
                                
                                const textEls = element.querySelectorAll('.largeText, .textCN, .textEN');
                                textEls.forEach(el => { 
                                    const parentComponent = el.closest('[data-feature]') || el.closest('.zone');
                                    if (!parentComponent || !parentComponent.dataset.manualAlign) {
                                        el.style.textAlign = alignValue; 
                                    }
                                });
                                
                                const compositeEls = element.querySelectorAll('.composite');
                                compositeEls.forEach(compEl => {
                                    const classes = compEl.className.split(/\s+/);
                                    const compConfig = compositeComponents.find(c => classes.includes(c.id));
                                    if (!compConfig) return;
                                    if (compConfig.colorBarAdjustment) {
                                        const colorBar = compEl.querySelector('.colorBar');
                                        if (colorBar) colorBar.style.order = (alignValue === 'right') ? '99' : '';
                                    }
                                    if (compConfig.invertOrder) {
                                        compEl.style.flexDirection = (alignValue === 'right') ? 'row-reverse' : '';
                                    }
                                });
                            };

                            control.options.forEach(opt => {
                                const btn = document.createElement('button');
                                btn.className = 'optionBtn';
                                btn.textContent = opt.name;
                                if (opt.value === currentVal) btn.classList.add('active');
                                btn.addEventListener('click', () => {
                                    listEl.querySelectorAll('.optionBtn').forEach(b => b.classList.remove('active'));
                                    btn.classList.add('active');
                                    applyZoneAlignment(opt.value);
                                });
                                listEl.appendChild(btn);
                            });
                        }
                        group.appendChild(listEl);
                    });
                }
                return;
            }

            const config = featureConfig[featKey];
            if (!config) return;

            const group = document.createElement('div');
            group.className = `featureGroup ${featKey}`;
            group.innerHTML = `<h4>${config.label}</h4>`;

            config.controls.forEach(control => {
                let targetEl;
                
                // 特殊处理：当 element 是区域且控件目标是 .colorBar 时，直接操作区域本身
                if (element.classList.contains('zone') && control.target === '.colorBar' && control.type === 'color') {
                    targetEl = element;
                } else {
                    targetEl = control.target ? (element.querySelector(control.target) || (element.matches(control.target) ? element : null)) : element;
                }

                if (control.type === 'color' && !targetEl) {
                    const zoneEl = element.classList.contains('lineColor') ? element : element.closest('.zone.lineColor');
                    if (zoneEl) {
                        targetEl = zoneEl;
                    }
                }

                if (control.target && !targetEl) {
                    return;
                }

                const row = document.createElement('div');
                row.className = 'controlRow';
                if (control.id) {
                    row.classList.add(control.id);
                }
                if (control.label) {
                    const labelEl = document.createElement('label');
                    labelEl.textContent = control.label;
                    row.appendChild(labelEl);
                }

                let input;
                if (control.type === 'text' && targetEl) {
                    input = document.createElement('input');
                    input.type = 'text';
                    input.value = targetEl.textContent;
                    input.addEventListener('input', () => { targetEl.textContent = input.value; });
                }
                else if (control.type === 'color' && targetEl) {
                    input = document.createElement('input');
                    input.type = 'color';

                    let initialColor = '#b0b0b0';
                    if (targetEl.classList.contains('lineColor')) {
                        initialColor = targetEl.style.getPropertyValue('--current-line-bg').trim() || '#b0b0b0';
                    } else if (targetEl.style.backgroundColor) {
                        initialColor = rgb2hex(targetEl.style.backgroundColor);
                    }
                    input.value = rgb2hex(initialColor);

                    input.addEventListener('input', () => {
                        targetEl.style.backgroundColor = input.value;
                        // 元素级别的线路色修改，不再影响区域背景色
                        // 只有当 targetEl 本身就是区域时才更新 --current-line-bg
                        if (targetEl.classList.contains('zone')) {
                            targetEl.style.setProperty('--current-line-bg', input.value);
                        }
                    });
                }
                else if (control.type === 'select' && targetEl) {
                    input = document.createElement('select');
                    control.options.forEach(opt => {
                        const o = document.createElement('option');
                        o.value = opt.value; o.textContent = opt.name;
                        // 优先读取 transform，如果没有则尝试读取 data-transform
                        const currentTransform = targetEl.style.transform || targetEl.dataset.transform || '';
                        if (currentTransform === opt.value) {
                            o.selected = true;
                        }
                        input.appendChild(o);
                    });
                    input.addEventListener('change', () => { 
                        targetEl.style.transform = input.value; 
                        targetEl.dataset.transform = input.value;
                    });
                }
                else if (control.type === 'dropdown') {
                    // 特殊处理：editText 中的对齐 dropdown
                    if (featKey === 'editText' && control.label === '对齐') {
                        const listEl = document.createElement('div');
                        listEl.className = 'optionListGrid';

                        // 获取当前对齐状态（优先读取手动设置的状态）
                        const firstTextEl = element.querySelector('.largeText, .textCN, .textEN');
                        // 优先读取手动设置的状态，其次读取实际样式
                        const currentAlignVal = element.dataset.manualAlign || 
                            (firstTextEl ? (firstTextEl.style.textAlign || 'left') : 'left');

                        // 应用对齐到组件内的文本元素
                        const applyTextAlignment = (alignValue) => {
                            // 标记为手动设置的对齐状态
                            element.dataset.manualAlign = alignValue;
                            
                            // 应用到所有文本元素
                            const textEls = element.querySelectorAll('.largeText, .textCN, .textEN');
                            textEls.forEach(el => { 
                                el.style.textAlign = alignValue; 
                            });
                        };

                        [{ value: 'left', label: '左' }, { value: 'center', label: '中' }, { value: 'right', label: '右' }].forEach(opt => {
                            const btn = document.createElement('button');
                            btn.className = 'optionBtn';
                            btn.textContent = opt.label;
                            if (opt.value === currentAlignVal) btn.classList.add('active');
                            btn.addEventListener('click', () => {
                                listEl.querySelectorAll('.optionBtn').forEach(b => b.classList.remove('active'));
                                btn.classList.add('active');
                                applyTextAlignment(opt.value);
                            });
                            listEl.appendChild(btn);
                        });

                        input = listEl;
                    } else {
                    const classes = element.className.split(/\s+/);
                    const isLineDropdown = (control.label && control.label.includes('线路')) || featKey === 'selectLine';
                    const isIconDropdown = (control.label && control.label.includes('图标')) || featKey === 'selectIcon';
                    const isFacilityDropdown = (control.label && control.label.includes('设施')) || featKey === 'selectFacility';

                    // 1. 寻找对应的组件配置（支持复合组件与基础组件类名精确查找）
                    let componentConfig = compositeComponents.find(c => classes.includes(c.id));
                    if (!componentConfig && isIconDropdown) {
                        componentConfig = basicComponents.find(c => classes.includes(c.id)) || basicComponents.find(c => c.id === 'icon');
                    }

                    // 2. 建立绝对严格的 useList 推导链，全面支持明确声明的 false
                    let useList = false;
                    if (control.useList !== undefined) {
                        // 2a. 优先遵守 features.json 控件维度的声明
                        useList = (control.useList === true || control.useList === 'true');
                    } else if (componentConfig && componentConfig.useList !== undefined) {
                        // 2b. 其次遵守该基础/复合组件在配置里指定的声明
                        useList = (componentConfig.useList === true || componentConfig.useList === 'true');
                    } else {
                        // 2c. 仅在两端都没有声明时，进行行为兜底：线路不使用网格，图标默认使用网格
                        useList = isIconDropdown;
                    }

                    if (useList) {
                        input = document.createElement('div');
                        input.className = 'optionListGrid';

                        if (isLineDropdown) {
                            // 获取当前线路 ID（最可靠的匹配方式）
                            let currentLineId = element.dataset.lineId;
