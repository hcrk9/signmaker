    // Effect toggles
    function toggleEffect(type, forceState) {
        if (type === 'lighting') {
            const btn = document.getElementById('btnEffectLight');
            const overlay = document.getElementById('lightingOverlay');
            if (!btn || !overlay) return;
            const active = forceState !== undefined ? forceState : !btn.classList.contains('active');
            btn.classList.toggle('active', active);
            overlay.classList.toggle('active', active);
        }
        else if (type === 'hanger') {
            const btn = document.getElementById('btnEffectHanger');
            const hangers = document.querySelectorAll('.hanger');
            if (!btn) return;
            const active = forceState !== undefined ? forceState : !btn.classList.contains('active');
            btn.classList.toggle('active', active);
            hangers.forEach(h => h.classList.toggle('active', active));
        }
        else if (type === 'fade') {
            const btn = document.getElementById('btnEffectFade');
            const overlays = document.querySelectorAll('.hanger .fade-overlay');
            if (!btn) return;
            const active = forceState !== undefined ? forceState : !btn.classList.contains('active');
            btn.classList.toggle('active', active);
            overlays.forEach(o => o.classList.toggle('active', active));
        }
    }

    // Config loading & Style pack switching
    async function loadConfigAndInitialize() {
        try {
            const addonsData = await loadJSON('./addons/addons.json');

            // Bind change listeners to settings dropdowns once
            const canvasSizeSelect = document.getElementById('canvasSizeSelect');
            if (canvasSizeSelect) {
                canvasSizeSelect.addEventListener('change', handleCanvasSizeChange);
            }
            const customWidthInput = document.getElementById('canvasCustomWidthInput');
            if (customWidthInput) {
                customWidthInput.addEventListener('input', handleCustomWidthInputChange);
            }
            const signStyleSelect = document.getElementById('signStyleSelect');
            if (signStyleSelect) {
                signStyleSelect.addEventListener('change', handleSignStyleChange);
            }

            // Fetch addon details
            addonsList = [];
            const addonPromises = addonsData.map(async (addonId) => {
                try {
                    const meta = await loadJSON(`./addons/${addonId}/addon.json`);
                    addonsList.push(meta);
                } catch (e) {
                    console.error(`Failed to load addon metadata for ${addonId}:`, e);
                }
            });
            await Promise.all(addonPromises);

            // Populate project styles
            const projectStyleSelect = document.getElementById('projectStyleSelect');
            if (projectStyleSelect) {
                projectStyleSelect.innerHTML = '';
                const defaultOpt = document.createElement('option');
                defaultOpt.value = 'default';
                defaultOpt.textContent = '重庆轨道交通 - 2017标准';
                projectStyleSelect.appendChild(defaultOpt);

                addonsList.forEach(addon => {
                    const o = document.createElement('option');
                    o.value = addon.id;
                    o.textContent = addon.name;
                    projectStyleSelect.appendChild(o);
                });
                projectStyleSelect.addEventListener('change', handleProjectStyleChange);
            }

            initSvgBorder();

            // Apply default style pack
            await loadStylePack('default');

        } catch (error) {
            console.error('Failed to initialize configurations:', error);
        }
    }

    async function loadStylePack(addonId) {
        currentAddonId = addonId;

        let basicPath = './components/basic.json';
        let defaultPath = './components/default.json';
        let featuresPath = './components/features.json';
        let signsPath = './components/signs.json';

        if (addonId !== 'default') {
            basicPath = `./addons/${addonId}/basic.json`;
            defaultPath = `./addons/${addonId}/default.json`;
            featuresPath = `./addons/${addonId}/features.json`;
            signsPath = `./addons/${addonId}/signs.json`;
        }

        try {
            const [basicComponentsData, defaultData, featuresData, signsData] = await Promise.all([
                loadJSON(basicPath),
                loadJSON(defaultPath),
                loadJSON(featuresPath),
                loadJSON(signsPath).catch(err => {
                    console.warn(`Failed to load signs.json from ${signsPath}, falling back to default.`);
                    return loadJSON('./components/signs.json');
                })
            ]);

            basicComponents = basicComponentsData;
            featureConfig = featuresData;
            presetLinesConfig = defaultData.lines || [];
            presetFacilitiesConfig = defaultData.facilities || [];
            compositeComponents = defaultData.components || [];
            signsConfig = signsData;

            // Populate canvas sizes dropdown based on the currently selected sign style
            const canvasSizeSelect = document.getElementById('canvasSizeSelect');
            const signStyleSelect = document.getElementById('signStyleSelect');
            
            // First populate sign styles dropdown
            if (signStyleSelect) {
                const currentVal = signStyleSelect.value;
                signStyleSelect.innerHTML = '';
                signsConfig.signStyles.forEach(opt => {
                    const o = document.createElement('option');
                    o.value = opt.id;
                    o.textContent = opt.name;
                    signStyleSelect.appendChild(o);
                });
                // Try to restore previous value, or fall back to first option
                if (Array.from(signStyleSelect.options).some(o => o.value === currentVal)) {
                    signStyleSelect.value = currentVal;
                } else {
                    const defaultStyleId = signsConfig.signStyles[0]?.id || '';
                    signStyleSelect.value = defaultStyleId;
                }
                // Apply initial sign style (border, canvas height, canvas widths, custom CSS)
                handleSignStyleChange({ target: signStyleSelect });
            }
            
            // Now populate canvas widths based on the selected sign style
            const selectedStyleId = signStyleSelect ? signStyleSelect.value : (signsConfig.signStyles[0]?.id || '');
            const selectedStyle = signsConfig.signStyles.find(s => s.id === selectedStyleId);
            
            if (canvasSizeSelect && selectedStyle) {
                const currentVal = canvasSizeSelect.value;
                canvasSizeSelect.innerHTML = '';
                
                // Add "auto" option as first option (hardcoded)
                const autoOption = document.createElement('option');
                autoOption.value = 'auto';
                autoOption.textContent = '自适应';
                canvasSizeSelect.appendChild(autoOption);
                
                // Add "custom" option as second option (hardcoded)
                const customOption = document.createElement('option');
                customOption.value = 'custom';
                customOption.textContent = '自定义';
                canvasSizeSelect.appendChild(customOption);
                
                // Add preset options from sign style config
                if (selectedStyle.canvasWidths && selectedStyle.canvasWidths.length > 0) {
                    selectedStyle.canvasWidths.forEach(opt => {
                        const o = document.createElement('option');
                        o.value = opt.value;
                        o.textContent = opt.name;
                        canvasSizeSelect.appendChild(o);
                    });
                }
                
                // Try to restore previous value, or fall back to 'auto'
                if (Array.from(canvasSizeSelect.options).some(o => o.value === currentVal)) {
                    canvasSizeSelect.value = currentVal;
                } else {
                    canvasSizeSelect.value = 'auto';
                }
            }

            // Update stylesheet link
            let link = document.getElementById('addon-style-link');
            if (addonId === 'default') {
                if (link) link.remove();
            } else {
                const addonMeta = addonsList.find(a => a.id === addonId);
                const cssFile = (addonMeta && addonMeta.css) || 'global.css';
                const cssPath = `./addons/${addonId}/${cssFile}`;

                if (!link) {
                    link = document.createElement('link');
                    link.id = 'addon-style-link';
                    link.rel = 'stylesheet';
                    document.head.appendChild(link);
                }
                link.href = cssPath;
            }

            // Render category & components list
            const canvas = document.getElementById('canvas');
            const composites = defaultData.components || [];
            categoriesConfig = defaultData.categories || [];

            currentCategoryId = categoriesConfig.find((cat) => cat.id === 'enter')?.id || categoriesConfig[0]?.id || '';
            isCategoryButtonsRendered = false;

            const updateUI = () => {
                renderCategoryButtons(categoriesConfig, currentCategoryId, (categoryId) => {
                    currentCategoryId = categoryId;
                    updateUI();
                });
                renderComponentsList(currentCategoryId, composites, basicComponents, categoriesConfig, canvas);
            };

            updateUI();

            // Clear property panel
            deselectAll();

        } catch (error) {
            console.error(`Failed to load style pack: ${addonId}`, error);
            alert(`加载风格包 ${addonId} 失败: ` + error.message);
        }
    }

    function handleCanvasSizeChange(e) {
        const val = e.target.value;
        const canvas = document.getElementById('canvas');
        const customWidthInput = document.getElementById('canvasCustomWidthInput');
        const canvasSizeSelect = document.getElementById('canvasSizeSelect');
        if (!canvas) return;

        if (val === 'custom') {
            // Show custom width input and set current canvas width as default
            if (customWidthInput) {
                customWidthInput.style.display = 'block';
                customWidthInput.value = canvas.offsetWidth;
            }
            // Narrow the select when custom is selected
            if (canvasSizeSelect) {
                canvasSizeSelect.style.width = '85px';
            }
            // Apply custom width
            applyCustomCanvasWidth(canvas, customWidthInput ? parseInt(customWidthInput.value) : canvas.offsetWidth);
        } else {
            // Hide custom width input
            if (customWidthInput) {
                customWidthInput.style.display = 'none';
            }
            // Restore select width
            if (canvasSizeSelect) {
                canvasSizeSelect.style.width = '180px';
            }
            
            if (val === 'auto') {
                canvas.style.width = 'auto';
                canvas.querySelectorAll('.zone').forEach(z => {
                    z.style.flex = 'none';
                });
            } else {
                canvas.style.width = `${val}px`;
            }
        }

        if (selectedElement && selectedElement.classList.contains('zone')) {
            openPropertyPanel(selectedElement);
        }
    }

    function applyCustomCanvasWidth(canvas, width) {
        if (!canvas || !width || width <= 0) return;
        canvas.style.width = `${width}px`;
    }

    function updateCanvasWidthOptionsForStyle(style) {
        const canvasSizeSelect = document.getElementById('canvasSizeSelect');
        if (!canvasSizeSelect || !style) return;
        
        const currentVal = canvasSizeSelect.value;
        canvasSizeSelect.innerHTML = '';
        
        // Add "auto" option as first option (hardcoded)
        const autoOption = document.createElement('option');
        autoOption.value = 'auto';
        autoOption.textContent = '自适应';
        canvasSizeSelect.appendChild(autoOption);
        
        // Add "custom" option as second option (hardcoded)
        const customOption = document.createElement('option');
        customOption.value = 'custom';
        customOption.textContent = '自定义';
        canvasSizeSelect.appendChild(customOption);
        
        // Add preset options from sign style config
        if (style.canvasWidths && style.canvasWidths.length > 0) {
            style.canvasWidths.forEach(opt => {
                const o = document.createElement('option');
                o.value = opt.value;
                o.textContent = opt.name;
                canvasSizeSelect.appendChild(o);
            });
        }
        
        // Try to restore previous value if it exists in the new options, or fall back to 'auto'
        if (Array.from(canvasSizeSelect.options).some(o => o.value === currentVal)) {
            canvasSizeSelect.value = currentVal;
        } else {
            canvasSizeSelect.value = 'auto';
        }
    }

    function handleCustomWidthInputChange(e) {
        const canvas = document.getElementById('canvas');
        const customWidthInput = document.getElementById('canvasCustomWidthInput');
        if (!canvas || !customWidthInput) return;
        
        const width = parseInt(customWidthInput.value);
        if (width && width > 0) {
            applyCustomCanvasWidth(canvas, width);
        }
        
        if (selectedElement && selectedElement.classList.contains('zone')) {
            openPropertyPanel(selectedElement);
        }
    }

    function handleSignStyleChange(e) {
        const styleId = e.target.value;
        const style = signsConfig.signStyles.find(s => s.id === styleId);
        if (!style) return;

        const canvas = document.getElementById('canvas');
        if (!canvas) return;

        // Update canvas width options based on the selected sign style
        updateCanvasWidthOptionsForStyle(style);

        // Apply canvas height
        if (style.canvasHeight) {
            canvas.style.setProperty('--canvas-height', style.canvasHeight);
        }

        // Set standard borders but make them transparent so they preserve the layout box sizing
        canvas.style.borderWidth = style.borderWidth || '0';
        canvas.style.borderStyle = style.borderStyle || 'none';
        canvas.style.borderColor = 'transparent';

        // Apply border styles using CSS variables so canvas::after pseudo-element can render it
        canvas.style.setProperty('--canvas-border-width', style.borderWidth || '0');
        canvas.style.setProperty('--canvas-border-style', style.borderStyle || 'none');
        
        // Parse borderColor: supports string (uniform) or object { top, right, bottom, left }
        const rawBorderColor = style.borderColor || 'transparent';
        let borderColorTop, borderColorRight, borderColorBottom, borderColorLeft;
        if (typeof rawBorderColor === 'object' && rawBorderColor !== null) {
            borderColorTop    = rawBorderColor.top    || rawBorderColor.default || 'transparent';
            borderColorRight  = rawBorderColor.right  || rawBorderColor.default || 'transparent';
            borderColorBottom = rawBorderColor.bottom || rawBorderColor.default || 'transparent';
            borderColorLeft   = rawBorderColor.left   || rawBorderColor.default || 'transparent';
        } else {
            borderColorTop = borderColorRight = borderColorBottom = borderColorLeft = rawBorderColor;
        }
        const perDirectionColors = [borderColorTop, borderColorRight, borderColorBottom, borderColorLeft];
        const hasAnyGradient = perDirectionColors.some(c => c.includes('linear-gradient') || c.includes('radial-gradient'));
        const allSolid = !hasAnyGradient;

        if (allSolid) {
            // All four sides are solid colors → use traditional border-color
            canvas.style.setProperty('--canvas-border-color', borderColorTop);
            // Clear all per-direction gradient/mask variables
            ['top', 'right', 'bottom', 'left'].forEach(dir => {
                canvas.style.removeProperty(`--canvas-border-gradient-${dir}`);
                canvas.style.removeProperty(`--canvas-border-mask-${dir}`);
            });
        } else {
            // At least one direction uses a gradient → use 4-layer background + mask approach
            canvas.style.setProperty('--canvas-border-color', 'transparent');
            
            // Set gradient for each direction
            canvas.style.setProperty('--canvas-border-gradient-top', borderColorTop);
            canvas.style.setProperty('--canvas-border-gradient-right', borderColorRight);
            canvas.style.setProperty('--canvas-border-gradient-bottom', borderColorBottom);
            canvas.style.setProperty('--canvas-border-gradient-left', borderColorLeft);
            
            // Set background size and position to restrict each gradient to its own border area
            // Format: background-size: width height; background-position: x y;
            // Top border: full width, top height, positioned at top
            canvas.style.setProperty('--canvas-border-bg-size-top', `100% var(--canvas-border-width-top)`);
            canvas.style.setProperty('--canvas-border-bg-pos-top', '0 0');
            
            // Right border: right width, full height, positioned at right
            canvas.style.setProperty('--canvas-border-bg-size-right', `var(--canvas-border-width-right) 100%`);
            canvas.style.setProperty('--canvas-border-bg-pos-right', '100% 0');
            
            // Bottom border: full width, bottom height, positioned at bottom
            canvas.style.setProperty('--canvas-border-bg-size-bottom', `100% var(--canvas-border-width-bottom)`);
            canvas.style.setProperty('--canvas-border-bg-pos-bottom', '0 100%');
            
            // Left border: left width, full height, positioned at left
            canvas.style.setProperty('--canvas-border-bg-size-left', `var(--canvas-border-width-left) 100%`);
            canvas.style.setProperty('--canvas-border-bg-pos-left', '0 0');
        }

        // Extract individual border widths to position canvas::after correctly outside the padding box
        const parts = (style.borderWidth || '0').trim().split(/\s+/);
        let top = '0', right = '0', bottom = '0', left = '0';
        if (parts.length === 1) {
            top = right = bottom = left = parts[0];
        } else if (parts.length === 2) {
            top = bottom = parts[0];
            right = left = parts[1];
        } else if (parts.length === 3) {
            top = parts[0];
            right = left = parts[1];
            bottom = parts[2];
        } else if (parts.length >= 4) {
            top = parts[0];
            right = parts[1];
            bottom = parts[2];
            left = parts[3];
        }

        canvas.style.setProperty('--canvas-border-width-top', top);
        canvas.style.setProperty('--canvas-border-width-right', right);
        canvas.style.setProperty('--canvas-border-width-bottom', bottom);
        canvas.style.setProperty('--canvas-border-width-left', left);

        // If any direction uses a gradient, construct per-direction mask-image
        if (hasAnyGradient) {
            canvas.style.setProperty('--canvas-border-mask-top',
                'linear-gradient(to bottom, black var(--canvas-border-width-top), transparent var(--canvas-border-width-top))');
            canvas.style.setProperty('--canvas-border-mask-bottom',
                'linear-gradient(to top, black var(--canvas-border-width-bottom), transparent var(--canvas-border-width-bottom))');
            canvas.style.setProperty('--canvas-border-mask-left',
                'linear-gradient(to right, black var(--canvas-border-width-left), transparent var(--canvas-border-width-left))');
            canvas.style.setProperty('--canvas-border-mask-right',
                'linear-gradient(to left, black var(--canvas-border-width-right), transparent var(--canvas-border-width-right))');
        }

        if (style.hanger) {
            canvas.style.setProperty('--hanger-width', `${style.hanger.width}px`);
            canvas.style.setProperty('--hanger-height', `${style.hanger.height}px`);
            canvas.style.setProperty('--hanger-bg', style.hanger.background);
        }

        if (style.hasMask) {
            canvas.classList.add('has-mask');
        } else {
            canvas.classList.remove('has-mask');
        }

        // Apply custom CSS if defined
        const customStyleEl = document.getElementById('custom-sign-style');
        if (customStyleEl) {
            customStyleEl.textContent = style.customCSS || '';
        }
    }

    async function handleProjectStyleChange(e) {
        await loadStylePack(e.target.value);
    }

    // Canvas serialization for JSON Save & Import
    function serializeCanvas() {
        const canvas = document.getElementById('canvas');
        const data = {
            projectName: document.getElementById('projectTitle').textContent.trim(),
            addonId: currentAddonId,
            canvasWidth: canvas.style.width || 'auto',
            signStyleId: document.getElementById('signStyleSelect')?.value || '',
            effects: {
                lighting: document.getElementById('btnEffectLight').classList.contains('active'),
                hanger: document.getElementById('btnEffectHanger').classList.contains('active'),
                fade: document.getElementById('btnEffectFade').classList.contains('active')
            },
            zones: []
        };

        const zones = canvas.querySelectorAll('.zone');
        zones.forEach(zone => {
            const zoneData = {
                category: zone.dataset.category || '',
                className: zone.className,
                style: zone.style.cssText,
                components: []
            };

            Array.from(zone.children).forEach(child => {
                if (child.classList.contains('insert-line')) return;

                const compData = {
                    id: child.id,
                    className: child.className,
                    dataset: { ...child.dataset },
                    style: child.style.cssText,
                    innerHTML: child.innerHTML
                };
                zoneData.components.push(compData);
            });

            data.zones.push(zoneData);
        });

        return data;
    }

    async function deserializeCanvas(data) {
        document.getElementById('projectTitle').textContent = data.projectName || '未命名标牌';

        // Re-load Style pack
        if (data.addonId) {
            const projectStyleSelect = document.getElementById('projectStyleSelect');
            if (projectStyleSelect) {
                projectStyleSelect.value = data.addonId;
            }
            await loadStylePack(data.addonId);
        }

        const canvas = document.getElementById('canvas');
        if (data.canvasWidth) {
            canvas.style.width = data.canvasWidth;
            const canvasSizeSelect = document.getElementById('canvasSizeSelect');
            if (canvasSizeSelect) {
                if (data.canvasWidth === 'auto') {
                    canvasSizeSelect.value = 'auto';
                } else {
                    canvasSizeSelect.value = data.canvasWidth.replace('px', '');
                }
            }
        }

        if (data.signStyleId) {
            const signStyleSelect = document.getElementById('signStyleSelect');
            if (signStyleSelect) {
                signStyleSelect.value = data.signStyleId;
            }
            handleSignStyleChange({ target: { value: data.signStyleId } });
        }

        if (data.effects) {
            toggleEffect('lighting', data.effects.lighting);
            toggleEffect('hanger', data.effects.hanger);
            toggleEffect('fade', data.effects.fade);
        }

        // Remove existing zones
        canvas.querySelectorAll('.zone').forEach(z => z.remove());

        // Rebuild zones
        data.zones.forEach(zoneData => {
            const zone = document.createElement('div');
            zone.className = zoneData.className;
            zone.dataset.category = zoneData.category;

            if (zone.classList.contains('lineColor')) {
                zone.dataset.feature = 'selectLine zoneTextWidth zoneAlign advancedOptions';
            } else {
                zone.dataset.feature = 'zoneTextWidth zoneAlign advancedOptions';
            }

            if (zoneData.style) {
                zone.style.cssText = zoneData.style;
            }

            zone.addEventListener('click', (e) => {
                if (e.target === zone) {
                    e.stopPropagation();
                    openPropertyPanel(zone);
                }
            });

            zoneData.components.forEach(compData => {
                const isImg = compData.className.includes('icon') && !compData.className.includes('composite');
                const el = document.createElement(isImg ? 'img' : 'div');
                el.id = compData.id;
                el.className = compData.className;
                if (compData.style) {
                    el.style.cssText = compData.style;
                }
                el.innerHTML = compData.innerHTML;

                if (compData.dataset) {
                    Object.entries(compData.dataset).forEach(([k, v]) => {
                        el.dataset[k] = v;
                    });
                }

                if (el.dataset.feature) {
                    el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openPropertyPanel(el);
                    });
                }

                zone.appendChild(el);
            });

            canvas.appendChild(zone);
        });

        deselectAll();
    }

    function saveCanvasToFile() {
        const data = serializeCanvas();
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${data.projectName}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }
    
    function saveCanvasToBrowser() {
        const data = serializeCanvas();
        const savedFiles = getSavedFiles();
        
        const newFile = {
            id: Date.now().toString(),
            name: data.projectName || '未命名标牌',
            timestamp: Date.now(),
            data: data
        };
        
        savedFiles.unshift(newFile);
        
        // Keep only last 50 files to avoid localStorage overflow
        if (savedFiles.length > 50) {
            savedFiles.pop();
        }
        
        localStorage.setItem('signmaker_saved_files', JSON.stringify(savedFiles));
        
        // Show toast notification
        showToast(`保存成功！${newFile.name}`);
    }
    
    function showToast(message) {
        const toast = document.getElementById('saveToast');
        if (!toast) return;
        
        toast.textContent = message;
        toast.classList.add('show');
        
        // Hide after 3 seconds
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }
    
    function getSavedFiles() {
        const stored = localStorage.getItem('signmaker_saved_files');
        return stored ? JSON.parse(stored) : [];
    }
    
    function renderSavedFilesList() {
        const savedFileList = document.querySelector('.savedFileList');
        if (!savedFileList) return;
        
        const savedFiles = getSavedFiles();
        
        // Clear existing content except the no-saved-file message
        const noSavedFileMsg = document.getElementById('noSavedFile');
        savedFileList.innerHTML = '';
        savedFileList.appendChild(noSavedFileMsg);
        
        if (savedFiles.length === 0) {
            noSavedFileMsg.style.display = 'block';
        } else {
            noSavedFileMsg.style.display = 'none';
            
            savedFiles.forEach(file => {
                const card = createSavedFileCard(file);
                savedFileList.appendChild(card);
            });
        }
    }
    
    function createSavedFileCard(file) {
        const card = document.createElement('div');
        card.className = 'savedFileCard';
        card.dataset.fileId = file.id;
        
        const date = new Date(file.timestamp);
        const dateTimeStr = `${date.getFullYear()}/${(date.getMonth() + 1).toString().padStart(2, '0')}/${date.getDate().toString().padStart(2, '0')} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}:${date.getSeconds().toString().padStart(2, '0')}`;
        
        card.innerHTML = `
            <span class="savedFileTitle">${file.name}</span>
            <div class="savedFileInfo">
                <span class="savedFileDateTime">${dateTimeStr}</span>
                <span class="divider">·</span>
                <button class="savedFileOpenBtn">打开</button>
                <span class="divider">·</span>
                <button class="savedFileDeleteBtn">删除</button>
            </div>
        `;
        
        // Bind open button
        const openBtn = card.querySelector('.savedFileOpenBtn');
        openBtn.addEventListener('click', () => {
            loadCanvasFromBrowser(file.id);
        });
        
        // Bind delete button
        const deleteBtn = card.querySelector('.savedFileDeleteBtn');
        deleteBtn.addEventListener('click', () => {
            if (confirm(`确定要删除标牌“${file.name}”吗？`)) {
                deleteSavedFile(file.id);
            }
        });
        
        return card;
    }
    
    function loadCanvasFromBrowser(fileId) {
        const savedFiles = getSavedFiles();
        const file = savedFiles.find(f => f.id === fileId);
        
        if (!file) {
            alert('找不到该标牌数据！');
            return;
        }
        
        if (confirm(`确定要打开标牌“${file.name}”吗？\n当前画布的内容将会被替换。`)) {
            deserializeCanvas(file.data);
            
            // Close saved file panel and show components panel
            const savedFilePanel = document.querySelector('.savedFilePanel');
            const componentsPanel = document.querySelector('.componentsPanel');
            const settingsPanel = document.querySelector('.settingsPanel');
            const savedFileBtn = document.getElementById('savedFileBtn');
            const settingsBtn = document.getElementById('settingsBtn');
            
            if (savedFilePanel) savedFilePanel.classList.remove('active');
            if (componentsPanel) componentsPanel.classList.remove('hidden');
            if (savedFileBtn) savedFileBtn.classList.remove('active');
            if (settingsPanel) settingsPanel.classList.remove('active');
            if (settingsBtn) settingsBtn.classList.remove('active');
        }
    }
    
    function deleteSavedFile(fileId) {
        let savedFiles = getSavedFiles();
        savedFiles = savedFiles.filter(f => f.id !== fileId);
        localStorage.setItem('signmaker_saved_files', JSON.stringify(savedFiles));
        renderSavedFilesList();
    }
    
    function clearCanvas() {
        const canvas = document.getElementById('canvas');
        if (!canvas) return;
        
        // Remove all child elements except hangers and lighting overlay
        const children = Array.from(canvas.children);
        children.forEach(child => {
            // Keep hanger elements and lighting overlay
            if (!child.classList.contains('hanger') && 
                !child.classList.contains('lighting-overlay') &&
                !child.classList.contains('insert-line')) {
                child.remove();
            }
        });
        
        // Clear selection and reset property panel
        deselectAll();
        
        // Disable quick action buttons
        const btnDuplicate = document.getElementById('btnDuplicate');
        const btnDelete = document.getElementById('btnDelete');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        
        if (btnDuplicate) btnDuplicate.disabled = true;
        if (btnDelete) btnDelete.disabled = true;
        if (btnLeft) btnLeft.disabled = true;
        if (btnRight) btnRight.disabled = true;
    }

    // Inlining images & background images to base64 for standalone SVG & PNG exports
    async function convertImagesToBase64(clone) {
        const imgs = clone.querySelectorAll('img');
        const imgPromises = Array.from(imgs).map(async (img) => {
            const src = img.getAttribute('src') || img.src;
            if (!src || src.startsWith('data:')) return;
            try {
                const res = await fetch(src);
                const blob = await res.blob();
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        img.src = reader.result;
                        resolve();
                    };
                    reader.readAsDataURL(blob);
                });
            } catch (e) {
                console.error('Failed to convert image to base64:', src, e);
            }
        });
        await Promise.all(imgPromises);

        // Convert lighting overlay background image to base64
        const lightingOverlay = clone.querySelector('#lightingOverlay');
        if (lightingOverlay && lightingOverlay.classList.contains('active')) {
            try {
                const res = await fetch('icon/lighting.png');
                const blob = await res.blob();
                await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        lightingOverlay.style.backgroundImage = `url(${reader.result})`;
                        resolve();
                    };
                    reader.readAsDataURL(blob);
                });
            } catch (e) {
                console.error('Failed to convert lighting overlay background to base64:', e);
            }
        }
    }

    function ensureHtml2Canvas() {
        if (window.html2canvas) return Promise.resolve();
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
            script.onload = resolve;
            script.onerror = reject;
            document.head.appendChild(script);
        });
    }

    // 核心 PNG 导出逻辑，removeBorder 控制是否去除边框
    async function _exportPNGCore(removeBorder) {
        const canvasEl = document.getElementById('canvas');
        if (!canvasEl) return;

        try {
            await ensureHtml2Canvas();

            // 临时重置缩放以确保 html2canvas 能够以 1:1 分辨率完美捕捉样式
            const originalZoom = canvasEl.style.zoom || '1';
            canvasEl.style.zoom = '1';

            // 保存并临时移除边框（如果导出无边框版本）
            const originalBorderWidth = canvasEl.style.borderWidth;
            const originalBorderStyle = canvasEl.style.borderStyle;
            const originalBorderColor = canvasEl.style.borderColor;
            const originalVarBorderWidth = canvasEl.style.getPropertyValue('--canvas-border-width');
            const originalVarBorderStyle = canvasEl.style.getPropertyValue('--canvas-border-style');
            if (removeBorder) {
                canvasEl.style.borderWidth = '0';
                canvasEl.style.borderStyle = 'none';
                canvasEl.style.setProperty('--canvas-border-width', '0');
                canvasEl.style.setProperty('--canvas-border-style', 'none');
            }

            // 检测光照是否激活
            const lightingOverlay = canvasEl.querySelector('#lightingOverlay');
            const hasLighting = lightingOverlay && lightingOverlay.classList.contains('active');

            // 导出时先隐藏光照层（html2canvas 不支持 mix-blend-mode）
            if (hasLighting) {
                lightingOverlay.classList.remove('active');
                lightingOverlay.style.display = 'none';
            }

            const scale = 10;

            // 执行截屏转换（不含光照层）
            const captureWidth = canvasEl.offsetWidth;
            const captureHeight = canvasEl.offsetHeight;
            const renderedCanvas = await html2canvas(canvasEl, {
                useCORS: true,
                allowTaint: true,
                backgroundColor: null,
                scale: scale,
                width: captureWidth,
                height: captureHeight,
                scrollX: 0,
                scrollY: 0
            });

            // 如果有光照效果，手动用 Canvas 2D API 合成 overlay 混合模式
            let finalCanvas = renderedCanvas;
            if (hasLighting) {
                // 恢复光照层显示状态
                lightingOverlay.style.display = '';
                lightingOverlay.classList.add('active');

                try {
                    // 用 fetch + blob 加载光照图片（避免 crossOrigin CORS 问题）
                    const res = await fetch('icon/lighting.png');
                    const blob = await res.blob();
                    const bitmapUrl = URL.createObjectURL(blob);
                    const lightingImg = await new Promise((resolve, reject) => {
                        const img = new Image();
                        img.onload = () => resolve(img);
                        img.onerror = reject;
                        img.src = bitmapUrl;
                    });

                    // 创建全新的离屏画布进行合成（避免在 html2canvas 结果上直接操作的兼容问题）
                    finalCanvas = document.createElement('canvas');
                    finalCanvas.width = renderedCanvas.width;
                    finalCanvas.height = renderedCanvas.height;
                    const ctx = finalCanvas.getContext('2d');

                    // 先绘制原始渲染结果
                    ctx.drawImage(renderedCanvas, 0, 0);

                    // 用 overlay 混合模式绘制光照层
                    ctx.globalCompositeOperation = 'overlay';

                    // 光照层在 CSS 中覆盖的是 content area（position:absolute 相对于 padding box）
                    if (removeBorder) {
                        ctx.drawImage(lightingImg, 0, 0, finalCanvas.width, finalCanvas.height);
                    } else {
                        // 有边框模式：光照仅覆盖内容区域
                        const cs = getComputedStyle(canvasEl);
                        const borderLeft = parseFloat(cs.borderLeftWidth) || 0;
                        const borderTop = parseFloat(cs.borderTopWidth) || 0;
                        const contentW = canvasEl.clientWidth;
                        const contentH = canvasEl.clientHeight;
                        ctx.drawImage(lightingImg,
                            borderLeft * scale, borderTop * scale,
                            contentW * scale, contentH * scale);
                    }
                    ctx.globalCompositeOperation = 'source-over';

                    URL.revokeObjectURL(bitmapUrl);
                } catch (lightErr) {
                    console.warn('光照合成失败，将导出无光照版本:', lightErr);
                    finalCanvas = renderedCanvas;
                }
            }

            // 还原网页上的缩放和边框状态
            canvasEl.style.zoom = originalZoom;
            if (removeBorder) {
                canvasEl.style.borderWidth = originalBorderWidth;
                canvasEl.style.borderStyle = originalBorderStyle;
                canvasEl.style.borderColor = originalBorderColor;
                canvasEl.style.setProperty('--canvas-border-width', originalVarBorderWidth);
                canvasEl.style.setProperty('--canvas-border-style', originalVarBorderStyle);
            }

            // 触发下载
            const suffix = removeBorder ? '_无边框' : '';
            const pngUrl = finalCanvas.toDataURL('image/png');
            const a = document.createElement('a');
            a.href = pngUrl;
            a.download = `${document.getElementById('projectTitle').textContent.trim()}${suffix}.png`;
            a.click();
        } catch (e) {
            console.error('PNG 导出失败:', e);
            alert('PNG 导出失败，请检查控制台错误信息。');

            // 确保异常时也恢复状态
            const canvasEl2 = document.getElementById('canvas');
            if (canvasEl2) canvasEl2.style.zoom = canvasEl2.style.zoom || '1';
            const lo = document.getElementById('lightingOverlay');
            if (lo) { lo.style.display = ''; }
        }
    }

    async function exportToPNG() {
        return _exportPNGCore(false);
    }

    async function exportToPNGNoBorder() {
        return _exportPNGCore(true);
    }

    async function exportToSVG() {
        const canvas = document.getElementById('canvas');
        if (!canvas) return;

        // 1. 临时重置页面缩放，确保物理像素坐标计算为 1:1
        const originalZoom = canvas.style.zoom || '1';
        canvas.style.zoom = '1';

        const width = canvas.offsetWidth;
        const height = canvas.offsetHeight;
        
        // 获取画布背景色
        const canvasStyle = window.getComputedStyle(canvas);
        const canvasSvgBg = canvasStyle.backgroundColor && canvasStyle.backgroundColor !== 'transparent' && canvasStyle.backgroundColor !== 'rgba(0, 0, 0, 0)' 
                            ? canvasStyle.backgroundColor : '#ffffff';

        // 2. 初始化标准纯矢量 SVG 骨架
        let svgContent = `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">\n`;
        
        // 渲染标牌底色
        svgContent += `  <rect width="${width}" height="${height}" fill="${canvasSvgBg}" />\n`;

        // 3. 递归遍历 DOM 树，将每个可视元素提取并重组为标准的绝对坐标 SVG 节点
        async function processElement(element) {
            const styles = window.getComputedStyle(element);
            if (styles.display === 'none' || styles.visibility === 'hidden' || styles.opacity === '0') return;

            // 计算当前元素相对于标牌画布（canvas）的绝对物理坐标与宽高
            const rect = element.getBoundingClientRect();
            const canvasRect = canvas.getBoundingClientRect();
            const x = rect.left - canvasRect.left;
            const y = rect.top - canvasRect.top;
            const w = rect.width;
            const h = rect.height;

            if (w <= 0 || h <= 0) return;

            // 情况 A：处理带有背景色的容器色块（如各个 zone、导向条色块等）
            const bg = styles.backgroundColor;
            if (bg && bg !== 'rgba(0, 0, 0, 0)' && bg !== 'transparent' && !element.classList.contains('canvasViewer')) {
                const rx = parseFloat(styles.borderTopLeftRadius) || 0;
                const ry = parseFloat(styles.borderTopLeftRadius) || 0;
                svgContent += `  <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${rx}" ry="${ry}" fill="${bg}" />\n`;
            }

            // 情况 B：图片/图标元素处理（SVG 提纯为纯路径曲线，PNG/JPG 保持位图）
            if (element.tagName === 'IMG') {
                const src = element.getAttribute('src') || element.src;
                if (src) {
                    if (src.endsWith('.svg') || src.startsWith('data:image/svg+xml')) {
                        try {
                            let svgText = '';
                            if (src.startsWith('data:')) {
                                svgText = decodeURIComponent(src.split(',')[1]);
                            } else {
                                const res = await fetch(src);
                                svgText = await res.text();
                            }
                            svgText = svgText.replace(/<\?xml[\s\S]*?\?>/g, '').replace(/<!DOCTYPE[\s\S]*?>/g, '');
                            const contentMatch = svgText.match(/<svg[\s\S]*?>([\s\S]*?)<\/svg>/i);
                            if (contentMatch && contentMatch[1]) {
                                let innerContent = contentMatch[1];
                                const viewBoxMatch = svgText.match(/viewBox=["']([^"']+)["']/i);
                                let transformStr = `matrix(1 0 0 1 ${x} ${y})`;
                                if (viewBoxMatch) {
                                    const vb = viewBoxMatch[1].trim().split(/\s+/).map(Number);
                                    if (vb.length === 4 && vb[2] > 0 && vb[3] > 0) {
                                        const scaleX = w / vb[2];
                                        const scaleY = h / vb[3];
                                        transformStr = `matrix(${scaleX} 0 0 ${scaleY} ${x - vb[0] * scaleX} ${y - vb[1] * scaleY})`;
                                    }
                                }
                                const iconFill = styles.color || '#ffffff';
                                svgContent += `  <g class="vector-icon" transform="${transformStr}" fill="${iconFill}">\n${innerContent}\n  </g>\n`;
                            }
                        } catch (err) {
                            console.warn(`图标提取失败: ${src}`, err);
                        }
                    } else {
                        let base64Src = src;
                        if (!src.startsWith('data:')) {
                            try {
                                const res = await fetch(src);
                                const blob = await res.blob();
                                base64Src = await new Promise((resolve) => {
                                    const reader = new FileReader();
                                    reader.onloadend = () => resolve(reader.result);
                                    reader.readAsDataURL(blob);
                                });
                            } catch (e) {
                                console.error('位图转码失败:', src, e);
                            }
                        }
                        svgContent += `  <image x="${x}" y="${y}" width="${w}" height="${h}" xlink:href="${base64Src}" />\n`;
                    }
                }
                return;
            }

            // 情况 C：【精简、明确的中英文文本分离方案】
            for (let child of element.childNodes) {
                if (child.nodeType === Node.TEXT_NODE && child.textContent.trim() !== '') {
                    const rawText = child.textContent.trim();

                    const fontSize = styles.fontSize;
                    const fontWeight = styles.fontWeight;
                    const fontColor = styles.color;

                    // 1. 动态确定文本对齐锚点
                    const textAlign = styles.textAlign || 'left';
                    let textAnchor = 'start';
                    let textX = x;

                    if (textAlign === 'center' || styles.justifyContent === 'center') {
                        textAnchor = 'middle';
                        textX = x + w / 2;
                    } else if (textAlign === 'right' || styles.justifyContent === 'flex-end') {
                        textAnchor = 'end';
                        textX = x + w;
                    }

                    // 2. 完美的垂直居中数学对齐公式，消除一切错位偏上或偏下
                    const paddingTop = parseFloat(styles.paddingTop) || 0;
                    const paddingBottom = parseFloat(styles.paddingBottom) || 0;
                    const fSize = parseFloat(fontSize) || 16;
                    const textY = y + paddingTop + (h - paddingTop - paddingBottom) / 2 + (fSize * 0.35);

                    // 3. 将文字按照「中文字符」和「非中文字符（西文/数字/空格）」进行严格拆分
                    // \u4e00-\u9fa5 是中文字符集，\u3000-\u303f 是中文标点符号
                    const tokens = rawText.split(/([\u4e00-\u9fa5\u3000-\u303f]+)/g).filter(Boolean);

                    // 构造精准声明字体的 <text> 节点
                    let textNodeStr = `  <text x="${textX}" y="${textY}" font-size="${fontSize}" font-weight="${fontWeight}" fill="${fontColor}" text-anchor="${textAnchor}">`;
                    
                    for (let token of tokens) {
                        // 如果包含中文字符，绑定 IBM Plex Sans SC，否则绑定 Geist
                        const isCJK = /[\u4e00-\u9fa5\u3000-\u303f]/.test(token);
                        const targetFont = isCJK ? 'IBM Plex Sans SC' : 'Geist';

                        // XML 安全转义，防止 ParserError
                        const escapedToken = token
                            .replace(/&/g, '&amp;')
                            .replace(/</g, '&lt;')
                            .replace(/>/g, '&gt;')
                            .replace(/"/g, '&quot;')
                            .replace(/'/g, '&apos;');

                        // 用 tspan 将中西文字体绝对锁死，杜绝渲染引擎胡乱回退
                        textNodeStr += `<tspan font-family="${targetFont}">${escapedToken}</tspan>`;
                    }
                    textNodeStr += `</text>\n`;
                    
                    svgContent += textNodeStr;
                }
            }

            // 递归向下处理子节点
            for (let child of element.children) {
                if (!child.classList.contains('insert-line') && !child.classList.contains('lighting-overlay') && !child.classList.contains('fade-overlay')) {
                    await processElement(child);
                }
            }
        }

        // 4. 标牌外壳描边转矢量路径
        const afterStyle = window.getComputedStyle(canvas, '::after');
        if (afterStyle && afterStyle.borderStyle !== 'none' && afterStyle.borderWidth !== '0px') {
            const borderTop = parseFloat(afterStyle.borderTopWidth) || 0;
            const borderLeft = parseFloat(afterStyle.borderLeftWidth) || 0;
            const borderBottom = parseFloat(afterStyle.borderBottomWidth) || 0;
            const borderRight = parseFloat(afterStyle.borderRightWidth) || 0;
            const borderColor = afterStyle.borderColor || '#151515';
            const borderRadius = parseFloat(afterStyle.borderRadius) || 0;

            if (borderTop > 0 || borderLeft > 0) {
                if (borderTop === borderLeft && borderTop === borderBottom && borderTop === borderRight) {
                    svgContent += `  <rect x="${borderTop / 2}" y="${borderTop / 2}" width="${width - borderTop}" height="${height - borderTop}" rx="${borderRadius}" ry="${borderRadius}" fill="none" stroke="${borderColor}" stroke-width="${borderTop}" stroke-linejoin="round" />\n`;
                } else {
                    svgContent += `  \n`;
                    svgContent += `  <path d="M0,0 L${width},0 L${width},${height} L0,${height} Z M${borderLeft},${borderTop} L${borderLeft},${height - borderBottom} L${width - borderRight},${height - borderBottom} L${width - borderRight},${borderTop} Z" fill="${borderColor}" />\n`;
                }
            }
        }

        // 5. 按层级顺序依次扫描渲染所有的 Zone 色块及内部组件
        const zones = canvas.querySelectorAll('.zone');
        for (let zone of zones) {
            await processElement(zone);
        }

        svgContent += `</svg>`;

        // 6. 还原网页当前的真实缩放状态
        canvas.style.zoom = originalZoom;

        // 7. 生成离线标准 SVG 矢量文件并触发浏览器下载
        const blob = new Blob([svgContent], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${document.getElementById('projectTitle').textContent.trim()}.svg`;
        a.click();
        URL.revokeObjectURL(url);
    }

            if (e.target.closest('[draggable="true"]')) return;
            isDown = true;
            viewer.classList.add('dragging');

        viewer.addEventListener('mouseleave', () => {
            isDown = false;
            viewer.classList.remove('dragging');
        });

            isDown = false;
            viewer.classList.remove('dragging');
        });
        viewer.addEventListener('mousemove', (e) => {
            if (!isDown) return; e.preventDefault();
            const x = e.pageX - viewer.offsetLeft;
            viewer.scrollLeft = scrollLeft - (x - startX) * 1.5;

    function applyCustomStyles(settings) {

    function loadSettingsToInputs(settings) {
        if (!settings) return;
        
        // Load font settings
        const largeTextFont = document.getElementById('largeTextFont');
        const largeTextWeight = document.getElementById('largeTextWeight');
        const medTextFont = document.getElementById('medTextFont');
        const medTextWeight = document.getElementById('medTextWeight');
        const smallTextFont = document.getElementById('smallTextFont');
        const smallTextWeight = document.getElementById('smallTextWeight');
        
        if (largeTextFont) largeTextFont.value = settings.largeTextFont;
        if (largeTextWeight) largeTextWeight.value = parseInt(settings.largeTextWeight);
        if (medTextFont) medTextFont.value = settings.medTextFont;
        if (medTextWeight) medTextWeight.value = parseInt(settings.medTextWeight);
        if (smallTextFont) smallTextFont.value = settings.smallTextFont;
        if (smallTextWeight) smallTextWeight.value = parseInt(settings.smallTextWeight);
        
        // Load color settings
        const colorSettings = [
            { bg: 'enterZoneBgColor', fg: 'enterZoneColor' },
            { bg: 'exitZoneBgColor', fg: 'exitZoneColor' },
            { bg: 'facilityZoneBgColor', fg: 'facilityZoneColor' },
            { bg: 'basicZoneBgColor', fg: 'basicZoneColor' }
        ];
        
        colorSettings.forEach(setting => {
            const bgInput = document.getElementById(setting.bg);
            const fgInput = document.getElementById(setting.fg);
            const bgHexInput = document.getElementById(setting.bg + 'Hex');
            const fgHexInput = document.getElementById(setting.fg + 'Hex');
            
            const bgKey = setting.bg.replace('ZoneBgColor', 'BgColor');
            const fgKey = setting.fg.replace('ZoneColor', 'Color');
            
            if (bgInput) bgInput.value = settings[bgKey];
            if (fgInput) fgInput.value = settings[fgKey];
            if (bgHexInput) bgHexInput.value = settings[bgKey].toUpperCase();
            if (fgHexInput) fgHexInput.value = settings[fgKey].toUpperCase();
        });
    }
    
    function setupPreviewListeners() {
        const previewCanvas = document.querySelector('.stylePreviewCanvas');
        if (!previewCanvas) return;
        
        // Font inputs
        const fontInputs = [
            'largeTextFont', 'largeTextWeight',
            'medTextFont', 'medTextWeight',
            'smallTextFont', 'smallTextWeight'
        ];
        
        fontInputs.forEach(id => {
            const input = document.getElementById(id);
            if (input) {
                input.addEventListener('input', () => {
                    updatePreviewFromInputs();
                });
            }
        });
        
        // Color inputs
        const colorInputs = [
            'enterZoneBgColor', 'enterZoneColor',
            'exitZoneBgColor', 'exitZoneColor',
            'facilityZoneBgColor', 'facilityZoneColor',
            'basicZoneBgColor', 'basicZoneColor'
        ];
        
        colorInputs.forEach(id => {
            const input = document.getElementById(id);
            if (input) {
                input.addEventListener('input', () => {
                    updatePreviewFromInputs();
                    syncColorToHex(input.id);
                });
            }
        });
        
        // Setup HEX color inputs
        setupHexColorInputs();
    }
    
    function setupHexColorInputs() {
        const hexInputPairs = [
            { color: 'enterZoneBgColor', hex: 'enterZoneBgColorHex' },
            { color: 'enterZoneColor', hex: 'enterZoneColorHex' },
            { color: 'exitZoneBgColor', hex: 'exitZoneBgColorHex' },
            { color: 'exitZoneColor', hex: 'exitZoneColorHex' },
            { color: 'facilityZoneBgColor', hex: 'facilityZoneBgColorHex' },
            { color: 'facilityZoneColor', hex: 'facilityZoneColorHex' },
            { color: 'basicZoneBgColor', hex: 'basicZoneBgColorHex' },
            { color: 'basicZoneColor', hex: 'basicZoneColorHex' }
        ];
        
        hexInputPairs.forEach(pair => {
            const colorInput = document.getElementById(pair.color);
            const hexInput = document.getElementById(pair.hex);
            
            if (!colorInput || !hexInput) return;
            
            // Initialize hex input with current color value
            hexInput.value = colorInput.value.toUpperCase();
            
            // Listen for changes in color picker -> update hex input
            colorInput.addEventListener('input', () => {
                hexInput.value = colorInput.value.toUpperCase();
                hexInput.classList.remove('invalid');
            });
            
            // Listen for changes in hex input -> update color picker
            hexInput.addEventListener('blur', () => {
                validateAndUpdateColor(hexInput, colorInput);
            });
            
            hexInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    validateAndUpdateColor(hexInput, colorInput);
                    hexInput.blur();
                }
            });
            
            hexInput.addEventListener('input', () => {
                // Clear invalid state while typing
                hexInput.classList.remove('invalid');
            });
        });
    }
    
    function validateAndUpdateColor(hexInput, colorInput) {
        let hexValue = hexInput.value.trim();
        
        // Add # prefix if missing
        if (!hexValue.startsWith('#')) {
            hexValue = '#' + hexValue;
        }
        
        // Validate HEX color (3 or 6 digits)
        if (/^#([0-9A-Fa-f]{3}){1,2}$/.test(hexValue)) {
            // Expand 3-digit hex to 6-digit
            if (hexValue.length === 4) {
                hexValue = '#' + hexValue[1] + hexValue[1] + hexValue[2] + hexValue[2] + hexValue[3] + hexValue[3];
            }
            
            // Update color picker
            colorInput.value = hexValue.toLowerCase();
            hexInput.value = hexValue.toUpperCase();
            hexInput.classList.remove('invalid');
            
            // Trigger preview update
            updatePreviewFromInputs();
        } else {
            // Invalid HEX color - show error state
            hexInput.classList.add('invalid');
        }
    }
    
    function syncColorToHex(colorInputId) {
        const hexSuffix = 'Hex';
        const hexInputId = colorInputId + hexSuffix;
        const hexInput = document.getElementById(hexInputId);
        const colorInput = document.getElementById(colorInputId);
        
        if (hexInput && colorInput) {
            hexInput.value = colorInput.value.toUpperCase();
            hexInput.classList.remove('invalid');
        }
    }
    
    function updatePreviewFromInputs() {
        const previewCanvas = document.querySelector('.stylePreviewCanvas');
        if (!previewCanvas) return;
        
        const settings = getSettingsFromInputs();
        
        // Update fonts in preview
        previewCanvas.querySelectorAll('.largeText, .textCN').forEach(el => {
            if (el.classList.contains('largeText')) {
                el.style.fontFamily = settings.largeTextFont;
                el.style.fontWeight = settings.largeTextWeight;
            } else if (el.classList.contains('textCN')) {
                el.style.fontFamily = settings.medTextFont;
                el.style.fontWeight = settings.medTextWeight;
            }
        });
        
        previewCanvas.querySelectorAll('.textEN').forEach(el => {
            el.style.fontFamily = settings.smallTextFont;
            el.style.fontWeight = settings.smallTextWeight;
        });
        
        // Update zone colors in preview
        previewCanvas.querySelectorAll('.zone[data-category="enter"]').forEach(el => {
            el.style.backgroundColor = settings.enterBgColor;
            el.style.color = settings.enterColor;
        });
        
        previewCanvas.querySelectorAll('.zone[data-category="exit"]').forEach(el => {
            el.style.backgroundColor = settings.exitBgColor;
            el.style.color = settings.exitColor;
        });
        
        previewCanvas.querySelectorAll('.zone[data-category="facility"]').forEach(el => {
            el.style.backgroundColor = settings.facilityBgColor;
            el.style.color = settings.facilityColor;
        });
    }
    
    function loadSavedStyles() {
        const saved = localStorage.getItem('customStyles');
        if (saved) {
            try {
                const settings = JSON.parse(saved);
                applyCustomStyles(settings);
            } catch (e) {
                console.error('Failed to load saved styles:', e);
            }
        }
    }

    document.addEventListener('DOMContentLoaded', loadConfigAndInitialize);

    function handleDrop(payload, e, composites, basicComponents, canvas) {
        const { id } = payload;
        const category = id === 'lineColorText' ? 'lineColor' : (payload.category || 'default');
        const zoneClass = id === 'lineColorText' ? 'zone lineColor' : `zone ${category}`;
        const x = e.clientX; const y = e.clientY;
        const el = document.elementFromPoint(x, y);
        const targetZone = el ? el.closest('.zone') : null;

        const newNode = createNodeFromPayload(payload, composites, basicComponents);

        if (targetZone) {
            const targetCategory = targetZone.dataset.category || '';
            if (targetCategory === category || (targetCategory === 'lineColor' && category === 'enter')) {
                let inserted = false; const children = Array.from(targetZone.children);
                for (let child of children) {
                    const rect = child.getBoundingClientRect();
                    if (x < (rect.left + rect.width / 2)) {
                        targetZone.insertBefore(newNode, child);
                        inserted = true; break;
                    }
                }
                if (!inserted) targetZone.appendChild(newNode);
                openPropertyPanel(newNode);
                return;
            }
            
            // 如果是基础元素添加到非basic的zone，应用目标zone的样式
            if (payload.kind === 'basic' && targetCategory !== 'basic') {
                const targetCategoryConfig = categoriesConfig.find(cat => cat.id === targetCategory);
                if (targetCategoryConfig) {
                    const styleTags = {
                        color: targetCategoryConfig.bgColor
                    };
                    if (targetCategoryConfig.color) {
                        styleTags.style = `color: ${targetCategoryConfig.color}`;
                    }
                    applyTagsToElement(newNode, styleTags);
                }
                // 将新节点添加到目标zone
                let inserted = false; const children = Array.from(targetZone.children);
                for (let child of children) {
                    const rect = child.getBoundingClientRect();
                    if (x < (rect.left + rect.width / 2)) {
                        targetZone.insertBefore(newNode, child);
                        inserted = true; break;
                    }
                }
                if (!inserted) targetZone.appendChild(newNode);
                openPropertyPanel(newNode);
                return;
            }
        }
        createZoneElement(category, zoneClass, canvas).appendChild(newNode);
        openPropertyPanel(newNode);
    }

    function createNodeFromPayload(payload, composites, basicComponents) {
        if (payload.kind === 'composite') {
            return renderCompositeComponent(composites.find((c) => c.id === payload.id), basicComponents);
        }
        return renderBasicComponent(basicComponents.find((b) => b.id === payload.id), {}, undefined, false);
    }

    function showInsertLineAt(canvas, left, top, height) {
        let line = canvas.querySelector('.insert-line') || document.createElement('div');
        if (!line.parentNode) canvas.appendChild(line);
        line.className = 'insert-line';
        line.style.display = 'block';
        line.style.left = `${left / zoomLevel}px`;
        line.style.top = `${top / zoomLevel}px`;
        line.style.height = `${height}px`;
    }

    function getPayloadFromEvent(e) {
        try { return JSON.parse(e.dataTransfer.getData('application/json')); } catch (err) { }
        return currentDragPayload;
    }

    function hideInsertLine() {
        const line = document.querySelector('#canvas .insert-line');
        if (line) line.style.display = 'none';
    }

    function updateInsertIndicator(payload, e, composites, basicComponents, canvas) {
        const x = e.clientX; const canvasRect = canvas.getBoundingClientRect();
        const el = document.elementFromPoint(x, e.clientY);
        const targetZone = el ? el.closest('.zone') : null;

        const payloadCategory = payload.id === 'lineColorText' ? 'lineColor' : payload.category;

        if (targetZone && (targetZone.dataset.category === payloadCategory || (targetZone.dataset.category === 'lineColor' && payloadCategory === 'enter'))) {
            const children = Array.from(targetZone.children);
            for (let child of children) {
                const rect = child.getBoundingClientRect();
                if (x < (rect.left + rect.width / 2)) {
                    showInsertLineAt(canvas, rect.left - canvasRect.left, targetZone.getBoundingClientRect().top - canvasRect.top, targetZone.clientHeight);
                    return;
                }
            }
        }
        hideInsertLine();
    }

    /**
     * 🛠️ 初始化 SVG 矢量边框层并自动监听 CSS 变量 (引入 clipPath 彻底解决接缝露底 bug)
     */
    function initSvgBorder() {
        const canvas = document.getElementById('canvas');
        if (!canvas) return;

        const oldSvg = document.getElementById('canvas-svg-border');
        if (oldSvg) oldSvg.remove();

        // 依然保留 clipPath，用于把左右边框在最外圈可能多出来的亚像素边缘切干净
        const svgHtml = `
        <svg id="canvas-svg-border" width="100%" height="100%" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="position:absolute; pointer-events:none; z-index:10; overflow:visible;">
            <defs>
                <clipPath id="svg-border-clip">
                    <rect x="0" y="0" width="100%" height="100%" />
                </clipPath>

                <linearGradient id="svg-border-top" x1="0%" y1="0%" x2="100%" y2="0%"></linearGradient>
                <linearGradient id="svg-border-bottom" x1="0%" y1="0%" x2="100%" y2="0%"></linearGradient>
                <linearGradient id="svg-border-left" x1="0%" y1="0%" x2="0%" y2="100%"></linearGradient>
                <linearGradient id="svg-border-right" x1="0%" y1="0%" x2="0%" y2="100%"></linearGradient>
            </defs>
            
            <g clip-path="url(#svg-border-clip)">
                <rect id="svg-rect-left" x="0" y="0" height="100%" fill="url(#svg-border-left)" />
                <rect id="svg-rect-right" x="0" y="0" height="100%" fill="url(#svg-border-right)" />
                <rect id="svg-rect-top" x="0" y="0" width="100%" fill="url(#svg-border-top)" />
                <rect id="svg-rect-bottom" x="0" y="0" width="100%" fill="url(#svg-border-bottom)" />
            </g>
        </svg>
        `;
        
        canvas.insertAdjacentHTML('afterbegin', svgHtml);

        const observer = new MutationObserver(() => {
            syncSvgBorderWithCssVariables(canvas);
        });

        observer.observe(canvas, {
            attributes: true,
            attributeFilter: ['style']
        });

        syncSvgBorderWithCssVariables(canvas);
    }

    /**
     * 🔄 读取 CSS 变量并完美同步到 SVG 几何坐标系中
     * 当某一边框宽度为 0 时，相邻边框自动延伸以覆盖完整范围
     */
    function syncSvgBorderWithCssVariables(canvas) {
        const computedStyle = getComputedStyle(canvas);

        const tWidth = parseInt(computedStyle.getPropertyValue('--canvas-border-width-top')) || 6;
        const bWidth = parseInt(computedStyle.getPropertyValue('--canvas-border-width-bottom')) || 10;
        const lWidth = parseInt(computedStyle.getPropertyValue('--canvas-border-width-left')) || 6;
        const rWidth = parseInt(computedStyle.getPropertyValue('--canvas-border-width-right')) || 6;

        const tGrad = computedStyle.getPropertyValue('--canvas-border-gradient-top').trim();
        const bGrad = computedStyle.getPropertyValue('--canvas-border-gradient-bottom').trim();
        const lGrad = computedStyle.getPropertyValue('--canvas-border-gradient-left').trim();
        const rGrad = computedStyle.getPropertyValue('--canvas-border-gradient-right').trim();

        const svgContainer = document.getElementById('canvas-svg-border');
        if (svgContainer) {
            svgContainer.style.top = `-${tWidth}px`;
            svgContainer.style.left = `-${lWidth}px`;
            svgContainer.style.right = `-${rWidth}px`;
            svgContainer.style.bottom = `-${bWidth}px`;
            svgContainer.style.width = `calc(100% + ${lWidth + rWidth}px)`;
            svgContainer.style.height = `calc(100% + ${tWidth + bWidth}px)`;
        }

        // 边框重叠量 (单位: 像素)
        const overlap = 2;

        // 判断上下边框是否为 0
        const isTopZero = tWidth === 0;
        const isBottomZero = bWidth === 0;
        
        // 判断左右边框是否为 0
        const isLeftZero = lWidth === 0;
        const isRightZero = rWidth === 0;

        // 1. 上下边框处理
        const rectTop = document.getElementById('svg-rect-top');
        if (rectTop) {
            rectTop.setAttribute('height', tWidth);
            // 如果左边框或右边框为 0，上下边框需要向对应方向延伸
            if (isLeftZero) {
                rectTop.setAttribute('x', -overlap);
                rectTop.setAttribute('width', `calc(100% + ${overlap}px)`);
            } else if (isRightZero) {
                rectTop.setAttribute('x', 0);
                rectTop.setAttribute('width', `calc(100% + ${overlap}px)`);
            } else {
                rectTop.setAttribute('x', 0);
                rectTop.setAttribute('width', '100%');
            }
        }

        const rectBottom = document.getElementById('svg-rect-bottom');
        if (rectBottom) {
            rectBottom.setAttribute('y', `calc(100% - ${bWidth}px)`);
            rectBottom.setAttribute('height', bWidth);
            // 如果左边框或右边框为 0，上下边框需要向对应方向延伸
            if (isLeftZero) {
                rectBottom.setAttribute('x', -overlap);
                rectBottom.setAttribute('width', `calc(100% + ${overlap}px)`);
            } else if (isRightZero) {
                rectBottom.setAttribute('x', 0);
                rectBottom.setAttribute('width', `calc(100% + ${overlap}px)`);
            } else {
                rectBottom.setAttribute('x', 0);
                rectBottom.setAttribute('width', '100%');
            }
        }

        // 2. 左右边框处理
        // 计算左右边框的起始 y 坐标和高度
        let leftStartY, rightStartY, leftHeight, rightHeight;
        
        if (isTopZero && isBottomZero) {
            // 上下边框都为 0，左右边框覆盖整个高度
            leftStartY = -overlap;
            rightStartY = -overlap;
            leftHeight = `calc(100% + ${overlap * 2}px)`;
            rightHeight = `calc(100% + ${overlap * 2}px)`;
        } else if (isTopZero) {
            // 只有上边框为 0，左右边框向上延伸至顶部
            leftStartY = -overlap;
            rightStartY = -overlap;
            leftHeight = `calc(100% - ${bWidth - overlap}px)`;
            rightHeight = `calc(100% - ${bWidth - overlap}px)`;
        } else if (isBottomZero) {
            // 只有下边框为 0，左右边框向下延伸至底部
            leftStartY = tWidth - overlap;
            rightStartY = tWidth - overlap;
            leftHeight = `calc(100% - ${tWidth - overlap}px)`;
            rightHeight = `calc(100% - ${tWidth - overlap}px)`;
        } else {
            // 上下边框都存在，使用标准逻辑
            leftStartY = tWidth - overlap;
            rightStartY = tWidth - overlap;
            leftHeight = `calc(100% - ${tWidth + bWidth - (overlap * 2)}px)`;
            rightHeight = `calc(100% - ${tWidth + bWidth - (overlap * 2)}px)`;
        }

        // 左边边框
        const rectLeft = document.getElementById('svg-rect-left');
        if (rectLeft) {
            rectLeft.setAttribute('x', 0);
            rectLeft.setAttribute('width', lWidth);
            rectLeft.setAttribute('y', leftStartY);
            rectLeft.setAttribute('height', leftHeight);
        }

        // 右边边框
        const rectRight = document.getElementById('svg-rect-right');
        if (rectRight) {
            rectRight.setAttribute('x', `calc(100% - ${rWidth}px)`);
            rectRight.setAttribute('width', rWidth);
            rectRight.setAttribute('y', rightStartY);
            rectRight.setAttribute('height', rightHeight);
        }

        applyCssGradientOrColorToSvg('svg-border-top', tGrad);
        applyCssGradientOrColorToSvg('svg-border-bottom', bGrad);
        applyCssGradientOrColorToSvg('svg-border-left', lGrad);
        applyCssGradientOrColorToSvg('svg-border-right', rGrad);
    }
    /**
     * 🧪 解析标准的 CSS linear-gradient 或纯色 Hex 颜色并注入到 SVG Defs 中（完美适配渐变角度）
     */
    function applyCssGradientOrColorToSvg(gradientId, cssValue) {
        const gradEl = document.getElementById(gradientId);
        if (!gradEl) return;

        gradEl.innerHTML = ''; // 清空旧色彩节点

        if (!cssValue || cssValue === 'none' || cssValue === '') {
            const stop = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
            stop.setAttribute('offset', '0%');
            stop.setAttribute('stop-color', 'transparent');
            gradEl.appendChild(stop);
            return;
        }

        // ✨ 核心优化：如果传入的值是纯 Hex 颜色（如 #333, #eaeaea）或纯色，直接生成矢量纯色块填充
        if (!cssValue.toLowerCase().includes('gradient')) {
            const stop1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
            stop1.setAttribute('offset', '0%');
            stop1.setAttribute('stop-color', cssValue);

            const stop2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
            stop2.setAttribute('offset', '100%');
            stop2.setAttribute('stop-color', cssValue);

            gradEl.appendChild(stop1);
            gradEl.appendChild(stop2);
            return;
        }

        // 默认 SVG 渐变方向坐标
        let x1 = "0%", y1 = "0%", x2 = "0%", y2 = "100%";

        const matchGradient = cssValue.match(/linear-gradient\((.*)\)/i);
        if (matchGradient && matchGradient[1]) {
            const fullContent = matchGradient[1].trim();
            const parts = fullContent.split(/,(?![^\(]*\))/); // 排除 rgba() 内部的逗号

            let firstPart = parts[0].trim().toLowerCase();
            let hasDirection = false;

            // A. 处理类似 to right, to bottom right 等方向关键字
            if (firstPart.startsWith('to ')) {
                hasDirection = true;
                x1 = "0%"; y1 = "0%"; x2 = "0%"; y2 = "0%";
                if (firstPart.includes('right')) x2 = "100%";
                if (firstPart.includes('left'))  x1 = "100%";
                if (firstPart.includes('bottom')) y2 = "100%";
                if (firstPart.includes('top'))    y1 = "100%";

                if (!firstPart.includes('right') && !firstPart.includes('left')) {
                    x1 = "0%"; x2 = "0%";
                }
                if (!firstPart.includes('top') && !firstPart.includes('bottom')) {
                    y1 = "0%"; y2 = "0%";
                }
            } 
            // B. 用三角函数精确处理数值角度（如 45deg, 90deg, 180deg 等）
            else if (firstPart.includes('deg')) {
                hasDirection = true;
                const angle = parseFloat(firstPart);
                if (!isNaN(angle)) {
                    // 转换 CSS 角度到 SVG 映射弧度
                    const angleRad = (angle - 90) * Math.PI / 180;
                    const cx = 0.5, cy = 0.5, r = 0.5;
                    const vx = Math.cos(angleRad) * r;
                    const vy = Math.sin(angleRad) * r;

                    x1 = `${((cx - vx) * 100).toFixed(2)}%`;
                    y1 = `${((cy - vy) * 100).toFixed(2)}%`;
                    x2 = `${((cx + vx) * 100).toFixed(2)}%`;
                    y2 = `${((cy + vy) * 100).toFixed(2)}%`;
                }
            }

            const stopsData = hasDirection ? parts.slice(1) : parts;

            // 应用解析完的方向坐标
            gradEl.setAttribute('x1', x1);
            gradEl.setAttribute('y1', y1);
            gradEl.setAttribute('x2', x2);
            gradEl.setAttribute('y2', y2);

            // 生成各个位置的颜色节点
            stopsData.forEach((stopStr, index) => {
                const trimmed = stopStr.trim();
                const match = trimmed.match(/(rgba?\(.*?\)|#[a-fA-F0-9]{3,8}|\b\w+\b)\s*([\d\.]+%|px)?/i);
                if (match) {
                    const color = match[1];
                    const offset = match[2] ? match[2] : `${(index / (stopsData.length - 1)) * 100}%`;

                    const stopEl = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
                    stopEl.setAttribute('offset', offset);
                    stopEl.setAttribute('stop-color', color);
                    gradEl.appendChild(stopEl);
                }
            });
        }
    }

    // 自动在 DOMContentLoaded 或运行期间安全绑定初始化逻辑
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initSvgBorder);
    } else {
        initSvgBorder();
    }
</script>
